<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>场景控制 - 店员端</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f5f5f5; display:flex; justify-content:center; padding:20px; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
.phone { width:375px; height:812px; background:#f5f7fa; border-radius:20px; overflow:hidden; box-shadow:0 4px 24px rgba(0,0,0,.12); display:flex; flex-direction:column; position:relative; }
.nav-top { position:fixed; top:10px; right:20px; z-index:200; }
.nav-top a { font-size:12px; color:#666; text-decoration:none; background:rgba(255,255,255,.95); padding:6px 14px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.12); }
.nav-bar { display:flex; align-items:center; padding:12px 16px; background:#fff; border-bottom:1px solid #f0f0f0; }
.back-btn { background:none; border:none; font-size:20px; cursor:pointer; padding:0 8px 0 0; }
.nav-title { flex:1; font-size:16px; font-weight:600; }
.page { flex:1; overflow-y:auto; padding:16px; padding-bottom:60px; }
.room-selector { background:#fff; border-radius:14px; padding:14px; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
.room-selector-label { font-size:13px; color:#999; }
.room-selector-value { font-size:15px; font-weight:600; color:#333; }
.current-scene { background:#fff; border-radius:14px; padding:14px; margin-bottom:16px; border-left:4px solid #07c160; }
.current-scene-label { font-size:12px; color:#999; margin-bottom:4px; }
.current-scene-name { font-size:16px; font-weight:600; color:#333; }
.current-scene-trigger { font-size:11px; color:#999; margin-top:4px; }
.section-title { font-size:14px; font-weight:600; color:#333; margin-bottom:12px; }
.scene-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:16px; }
.scene-card { background:#fff; border-radius:14px; padding:16px; text-align:center; cursor:pointer; border:2px solid transparent; transition:all .15s; }
.scene-card:hover { border-color:#0052d9; }
.scene-card.active { border-color:#07c160; background:#f0fdf4; }
.scene-card-icon { font-size:32px; margin-bottom:6px; }
.scene-card-name { font-size:15px; font-weight:600; }
.scene-card-desc { font-size:11px; color:#999; margin-top:4px; }
.scene-card-badge { font-size:10px; padding:2px 8px; border-radius:8px; background:#e8f5e9; color:#00a870; margin-top:6px; display:inline-block; }
.scene-card-badge.manual { background:#e3f2fd; color:#0052d9; }
.scene-card-badge.auto { background:#e8f5e9; color:#00a870; }
.scene-card-badge.schedule { background:#f3e5f5; color:#9c27b0; }
.params-section { background:#fff; border-radius:14px; padding:16px; margin-bottom:16px; }
.param-group { margin-bottom:14px; }
.param-group:last-child { margin-bottom:0; }
.param-label { font-size:13px; color:#666; margin-bottom:8px; font-weight:500; }
.temp-grid { display:flex; gap:4px; flex-wrap:wrap; }
.temp-chip { width:40px; height:32px; border-radius:8px; border:1.5px solid #e5e5e5; background:#fff; font-size:12px; cursor:pointer; text-align:center; transition:all .15s; }
.temp-chip.active { background:#0052d9; color:#fff; border-color:#0052d9; }
.color-grid { display:flex; gap:4px; }
.color-chip { flex:1; padding:8px 4px; border-radius:8px; border:1.5px solid #e5e5e5; background:#fff; font-size:11px; cursor:pointer; text-align:center; display:flex; flex-direction:column; }
.color-chip .cc-k { font-weight:600; font-size:13px; }
.color-chip .cc-name { font-size:9px; color:#999; }
.color-chip.active { background:#e3f2fd; color:#0052d9; border-color:#0052d9; }
.color-chip.active .cc-name { color:#0052d9; }
.slider-group { margin-bottom:14px; }
.slider-label { display:flex; justify-content:space-between; font-size:12px; color:#666; margin-bottom:6px; }
.slider { width:100%; -webkit-appearance:none; height:6px; border-radius:3px; background:#e5e5e5; outline:none; }
.slider::-webkit-slider-thumb { -webkit-appearance:none; width:24px; height:24px; border-radius:50%; background:#0052d9; cursor:pointer; }
.save-row { display:flex; gap:10px; margin-top:16px; }
.save-btn { flex:1; padding:12px; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; border:none; transition:opacity .15s; }
.save-btn:active { opacity:.8; }
.save-btn.primary { background:#0052d9; color:#fff; }
.save-btn.ghost { background:#f5f5f5; color:#666; }
.bottom-nav { display:flex; border-top:1px solid #eee; background:#fff; position:sticky; bottom:0; }
.nav-item { flex:1; text-align:center; padding:10px 0 6px; cursor:pointer; color:#999; }
.nav-item.active { color:#0052d9; }
.nav-item .nav-icon { font-size:20px; }
.nav-item .nav-label { font-size:10px; margin-top:2px; }
.toast { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:100;display:none; }
.modal-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:99;display:none;align-items:center;justify-content:center; }
.modal { background:#fff;border-radius:14px;padding:20px;width:300px;text-align:center; }
.modal h3 { font-size:15px;margin-bottom:8px;color:#333; }
.modal p { font-size:13px;color:#666;margin-bottom:12px; }
.modal-buttons { display:flex;gap:8px; }
.modal-btn { flex:1;padding:10px;border-radius:8px;font-size:14px;cursor:pointer;border:none;font-weight:600; }
.modal-btn.cancel { background:#f5f5f5;color:#666; }
.modal-btn.confirm { background:#0052d9;color:#fff; }
.override-note { background:#fffbf0; border-radius:10px; padding:10px 14px; margin-top:12px; font-size:12px; color:#e37318; }
</style>
</head>
<body>
<div class="nav-top"><a href="../../../index.html">返回导航</a></div>
<div class="phone">
  <div class="nav-bar">
    <button class="back-btn" onclick="history.back()">←</button>
    <span class="nav-title">场景控制</span>
  </div>
  <div class="page">
    <div class="room-selector" onclick="showRoomPicker()">
      <div><div class="room-selector-label">当前房间</div><div class="room-selector-value" id="selectedRoom">大茶室C</div></div>
      <span style="color:#ccc;font-size:18px;">▾</span>
    </div>

    <div class="current-scene">
      <div class="current-scene-label">当前场景</div>
      <div class="current-scene-name" id="activeSceneName">品茶模式</div>
      <div class="current-scene-trigger" id="activeSceneTrigger">手动触发</div>
    </div>

    <div class="section-title">手动切换场景</div>
    <div class="scene-grid" id="sceneGrid"></div>
    <div class="override-note" id="overrideNote" style="display:none;">⚠ 当前为手动覆盖状态，自动触发场景已抑制。系统将在下次状态变更时恢复自动模式。</div>

    <div class="params-section">
      <div class="section-title">场景默认参数 (管理员/店长可调)</div>
      <div class="param-group">
        <div class="param-label">空调温度</div>
        <div class="temp-grid" id="tempGrid"></div>
      </div>
      <div class="param-group">
        <div class="param-label">灯光色温</div>
        <div class="color-grid" id="colorGrid"></div>
      </div>
      <div class="param-group">
        <div class="param-label">音响音量</div>
        <div class="slider-group">
          <div class="slider-label"><span>0%</span><span id="volVal">70%</span><span>100%</span></div>
          <input type="range" class="slider" min="0" max="100" value="70" oninput="updateVol(this.value)">
        </div>
      </div>
      <div style="font-size:11px;color:#999;margin-bottom:12px;">参数保存后将更新场景默认值，后续自动触发时生效</div>
      <div class="save-row">
        <button class="save-btn primary" onclick="saveParams()">💾 保存场景默认参数</button>
      </div>
      <div class="save-row" style="margin-top:6px;">
        <button class="save-btn ghost" onclick="resetParams()">↩ 恢复系统默认参数</button>
      </div>
    </div>
  </div>
  <div class="bottom-nav">
    <div class="nav-item" onclick="location.href='../dashboard/index.html'"><div class="nav-icon">📊</div><div class="nav-label">工作台</div></div>
    <div class="nav-item" onclick="location.href='../room-status/index.html'"><div class="nav-icon">🏠</div><div class="nav-label">房态</div></div>
    <div class="nav-item" onclick="location.href='../device-monitor/index.html'"><div class="nav-icon">📱</div><div class="nav-label">设备</div></div>
    <div class="nav-item active"><div class="nav-icon">🎬</div><div class="nav-label">场景</div></div>
    <div class="nav-item" onclick="location.href='../cleaning-task/index.html'"><div class="nav-icon">🧹</div><div class="nav-label">保洁</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="roomPickerModal">
  <div class="modal"><div id="roomPickerContent"></div></div>
</div>
<div class="modal-overlay" id="sceneConfirmModal">
  <div class="modal">
    <h3 id="modalTitle">确认切换场景</h3>
    <p id="modalDesc">将向包间设备下发场景指令</p>
    <div class="modal-buttons">
      <button class="modal-btn cancel" onclick="hideModal()">取消</button>
      <button class="modal-btn confirm" onclick="confirmScene()">确认</button>
    </div>
  </div>
</div>
<script>
const rooms = [
  { roomId:"RM001", name:"大会议室", type:"MeetingRoom" },
  { roomId:"RM002", name:"中茶室A", type:"TeaRoom" },
  { roomId:"RM003", name:"中茶室B", type:"TeaRoom" },
  { roomId:"RM004", name:"大茶室C", type:"TeaRoom" },
];

let currentRoomIdx = 0; // 默认大茶室C
let activeScene = 'Welcome';
let isManualOverride = false;
let pendingScene = null;
let defaultParams = { temperature:24, colorTemp:3000, volume:40 };

const allScenes = [
  { id:'Welcome', name:'欢迎', icon:'🚪', desc:'开门即触发: 亮灯+空调+轻音乐', type:'Auto', defaultParams:{ temperature:24, colorTemp:3000, volume:40 } },
  { id:'TeaSession', name:'品茗', icon:'🍵', desc:'暖光+空调24°C+轻音乐40%', type:'Manual', defaultParams:{ temperature:24, colorTemp:3000, volume:40 } },
  { id:'Meeting', name:'会议', icon:'💡', desc:'冷白光4000K+静音', type:'Manual', defaultParams:{ temperature:24, colorTemp:4000, volume:0 } },
  { id:'Karaoke', name:'K歌', icon:'🎤', desc:'彩灯+音响80%', type:'Manual', defaultParams:{ temperature:24, colorTemp:3500, volume:80 } },
  { id:'EnergySave', name:'节能', icon:'♻', desc:'全部关闭，适用于无人时段', type:'Auto', defaultParams:{ temperature:26, colorTemp:2700, volume:0 } },
  { id:'PreOpen', name:'预开', icon:'⏰', desc:'提前开启空调24°C+半亮灯光', type:'Schedule', defaultParams:{ temperature:24, colorTemp:3000, volume:20 } },
];

const typeLabels = { Auto:'自动', Manual:'手动', Schedule:'定时' };

function getCurrentRoom() { return rooms[currentRoomIdx]; }

function showRoomPicker() {
  var html = "<h3>选择房间</h3>";
  rooms.forEach(function(r, i) {
    var isActive = i === currentRoomIdx;
    html += "<div style=\"display:flex;align-items:center;justify-content:space-between;padding:14px;border-bottom:1px solid #f0f0f0;cursor:pointer;font-size:14px;" + (isActive ? "color:#07c160;font-weight:600;" : "") + "\" onclick=\"selectRoom(" + i + ")\">" +
      "<span>" + (isActive ? "📍 " : "") + r.name + "</span>" +
      (isActive ? "<span style=\"color:#07c160;\">✓ 当前</span>" : "<span style=\"color:#ccc;\">›</span>") +
    "</div>";
  });
  html += "<button class=\"modal-btn cancel\" style=\"margin-top:12px;width:100%;\" onclick=\"hideRoomPicker()\">关闭</button>";
  document.getElementById("roomPickerContent").innerHTML = html;
  document.getElementById("roomPickerModal").style.display = "flex";
}
function selectRoom(idx) {
  currentRoomIdx = idx;
  document.getElementById("selectedRoom").textContent = getCurrentRoom().name;
  activeScene = "Welcome";
  isManualOverride = false;
  updateCurrentScene();
  renderScenes();
  hideRoomPicker();
}
function hideRoomPicker() { document.getElementById("roomPickerModal").style.display = "none"; }

function updateCurrentScene() {
  const scene = allScenes.find(s => s.id === activeScene);
  if (!scene) return;
  document.getElementById('activeSceneName').textContent = scene.name + '模式';
  document.getElementById('activeSceneTrigger').textContent = isManualOverride ? '手动覆盖 (已抑制自动触发)' : `${typeLabels[scene.type]}触发${scene.type==='Auto'?' · 手动切换后将抑制自动':''}`;
  document.getElementById('overrideNote').style.display = isManualOverride ? 'block' : 'none';
}

function renderScenes() {
  const room = getCurrentRoom();
  const isBookable = room.type === 'TeaRoom' || room.type === 'MeetingRoom';

  document.getElementById('sceneGrid').innerHTML = allScenes.map(s => {
    const isActive = s.id === activeScene;
    let disabled = false;
    // 展厅和工作间只能使用节能场景
    if (!isBookable && s.id !== 'EnergySave') disabled = true;

    return `<div class="scene-card ${isActive?'active':''}" onclick="${disabled?'showToast(\'该空间仅支持节能模式\')':'triggerScene(\''+s.id+'\')'}" style="${disabled?'opacity:.4;cursor:not-allowed;':''}">
      <div class="scene-card-icon">${s.icon}</div>
      <div class="scene-card-name">${s.name}</div>
      <div class="scene-card-desc">${s.desc}</div>
      <span class="scene-card-badge ${s.type.toLowerCase()}">${typeLabels[s.type]}触发</span>
      ${isActive?'<div style="font-size:11px;color:#07c160;margin-top:4px;">✓ 当前</div>':''}
    </div>`;
  }).join('');
}

function triggerScene(sceneId) {
  if (sceneId === activeScene) { showToast('已是当前场景'); return; }
  const currentScene = allScenes.find(s => s.id === activeScene);
  pendingScene = sceneId;
  const scene = allScenes.find(s => s.id === sceneId);
  document.getElementById('modalTitle').textContent = `切换到「${scene.name}」模式？`;
  const willOverride = currentScene?.type === 'Auto';
  document.getElementById('modalDesc').textContent = willOverride
    ? `将覆盖「${currentScene.name}」自动场景，自动触发将被抑制，下个周期恢复`
    : `将向「${getCurrentRoom().name}」下发场景指令`;
  document.getElementById('sceneConfirmModal').style.display = 'flex';
}

function confirmScene() {
  if (!pendingScene) return;
  const prevScene = allScenes.find(s => s.id === activeScene);
  if (prevScene?.type === 'Auto') isManualOverride = true;
  activeScene = pendingScene;
  const scene = allScenes.find(s => s.id === activeScene);
  if (scene.defaultParams) defaultParams = { ...scene.defaultParams };
  updateCurrentScene();
  renderScenes();
  renderParams();
  showToast(`「${scene.name}」场景已激活`);
  hideModal();
}

function updateVol(v) {
  defaultParams.volume = parseInt(v);
  document.getElementById('volVal').textContent = v+'%';
}

function saveParams() {
  showToast('场景默认参数已保存，将更新至设备联动规则');
}

function resetParams() {
  defaultParams = { temperature:24, colorTemp:3000, volume:40 };
  renderParams();
  showToast('已恢复系统默认参数');
}

function renderParams() {
  document.getElementById('tempGrid').innerHTML = [20,21,22,23,24,25,26].map(t =>
    `<button class="temp-chip ${defaultParams.temperature===t?'active':''}" onclick="selectTemp(${t})">${t}°</button>`
  ).join('');
  document.getElementById('colorGrid').innerHTML = [{k:2700,n:'暖黄'},{k:3000,n:'暖白'},{k:3500,n:'自然白'},{k:4000,n:'冷白'}].map(c =>
    `<button class="color-chip ${defaultParams.colorTemp===c.k?'active':''}" onclick="selectColor(${c.k})"><span class="cc-k">${c.k}K</span><span class="cc-name">${c.n}</span></button>`
  ).join('');
  document.getElementById('volVal').textContent = defaultParams.volume+'%';
  document.querySelector('.slider').value = defaultParams.volume;
}

function selectTemp(t) {
  defaultParams.temperature = t;
  renderParams();
  showToast(`默认温度已设为 ${t}°C`);
}

function selectColor(k) {
  defaultParams.colorTemp = k;
  renderParams();
  showToast(`默认色温已设为 ${k}K`);
}

function hideModal() { document.getElementById('sceneConfirmModal').style.display = 'none'; pendingScene = null; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

renderScenes();
renderParams();
updateCurrentScene();
</script>
</body>
</html>
