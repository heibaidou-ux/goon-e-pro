<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>房态看板 - 店员端</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f5f5f5; display:flex; justify-content:center; padding:20px; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
.phone { width:375px; height:812px; background:#f5f7fa; border-radius:20px; overflow:hidden; box-shadow:0 4px 24px rgba(0,0,0,.12); display:flex; flex-direction:column; position:relative; }
.nav-top { position:fixed; top:10px; right:20px; z-index:200; }
.nav-top a { font-size:12px; color:#666; text-decoration:none; background:rgba(255,255,255,.95); padding:6px 14px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.12); }
.header { background:#fff; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #f0f0f0; }
.header-title { font-size:17px; font-weight:700; }
.view-toggle { display:flex; background:#f0f0f0; border-radius:8px; padding:2px; }
.toggle-btn { padding:6px 14px; border-radius:6px; font-size:12px; cursor:pointer; border:none; background:transparent; color:#999; font-weight:500; }
.toggle-btn.active { background:#fff; color:#333; box-shadow:0 1px 3px rgba(0,0,0,.1); }
.page { flex:1; overflow-y:auto; padding:12px 16px; padding-bottom:60px; }
.room-card { background:#fff; border-radius:14px; padding:16px; margin-bottom:10px; border-left:4px solid #ccc; }
.room-card.inuse { border-left-color:#00a870; }
.room-card.booked { border-left-color:#9c27b0; }
.room-card.active { border-left-color:#366ef4; }
.room-card.cleaning { border-left-color:#e37318; }
.room-card.maintenance { border-left-color:#d54941; }
.room-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
.room-name { font-size:16px; font-weight:600; }
.room-status-badge { font-size:12px; font-weight:600; padding:3px 10px; border-radius:10px; color:#fff; }
.badge-inuse { background:#00a870; }
.badge-booked { background:#9c27b0; }
.badge-active { background:#366ef4; }
.badge-cleaning { background:#e37318; }
.badge-maintenance { background:#d54941; }
.room-detail { font-size:13px; color:#666; margin-bottom:8px; }
.room-detail-row { display:flex; gap:12px; margin-bottom:2px; }
.room-actions { display:flex; gap:6px; flex-wrap:wrap; }
.action-btn { padding:6px 12px; border-radius:7px; font-size:12px; cursor:pointer; border:none; font-weight:500; transition:opacity .15s; }
.action-btn:active { opacity:.8; }
.action-btn.primary { background:#e3f2fd; color:#0052d9; }
.action-btn.success { background:#e8f5e9; color:#00a870; }
.action-btn.warning { background:#fff3e0; color:#e37318; }
.action-btn.danger { background:#ffebee; color:#d54941; }
.action-btn.ghost { background:#f5f5f5; color:#666; }
.note { font-size:11px; color:#999; margin-top:4px; }
.bottom-nav { display:flex; border-top:1px solid #eee; background:#fff; flex-shrink:0; }
.nav-item { flex:1; text-align:center; padding:10px 0 6px; cursor:pointer; color:#999; }
.nav-item.active { color:#0052d9; }
.nav-item .nav-icon { font-size:20px; }
.nav-item .nav-label { font-size:10px; margin-top:2px; }
.modal-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:99;display:none;align-items:center;justify-content:center; }
.modal { background:#fff;border-radius:14px;padding:20px;width:310px; }
.modal h3 { font-size:16px;margin-bottom:8px;color:#333; }
.modal p { font-size:13px;color:#666;margin-bottom:4px; }
.modal input,.modal textarea { width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:13px;margin-bottom:8px; }
.modal textarea { height:60px; resize:vertical; }
.modal-buttons { display:flex;gap:8px;margin-top:12px; }
.modal-btn { flex:1;padding:10px;border-radius:8px;font-size:14px;cursor:pointer;border:none;font-weight:600; }
.modal-btn.cancel { background:#f5f5f5;color:#666; }
.modal-btn.confirm { background:#0052d9;color:#fff; }
.modal-btn.danger { background:#d54941;color:#fff; }
.modal-btn.success { background:#00a870;color:#fff; }
.modal-btn.warning { background:#e37318;color:#fff; }
.toast { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:100;display:none; }
.cleaning-progress { display:flex;align-items:center;gap:8px;font-size:12px;color:#e37318; margin-bottom:8px; }
.cleaning-bar { flex:1; height:4px; background:#eee; border-radius:2px; overflow:hidden; }
.cleaning-fill { height:100%; background:#e37318; border-radius:2px; }
.duration-btn { padding:10px 6px; border-radius:8px; font-size:13px; cursor:pointer; border:2px solid #e0e0e0; background:#fff; color:#333; font-weight:500; text-align:center; line-height:1.3; transition:all .15s; }
.duration-btn.selected { border-color:#0052d9; background:#e3f2fd; color:#0052d9; }
.duration-btn small { display:block; font-size:11px; font-weight:400; color:#999; margin-top:2px; }
.duration-btn.selected small { color:#0052d9; }
.payment-radio { flex:1; padding:8px 10px; border-radius:8px; font-size:13px; cursor:pointer; border:2px solid #e0e0e0; background:#fff; color:#666; font-weight:500; text-align:center; transition:all .15s; }
.payment-radio.selected { border-color:#00a870; background:#e8f5e9; color:#00a870; }
.time-select { padding:8px; border:1px solid #ddd; border-radius:8px; font-size:13px; background:#fff; color:#333; }
</style>
</head>
<body>
<div class="nav-top"><a href="../../../index.html">返回导航</a></div>
<div class="phone">
  <div class="header">
    <span class="header-title">房态看板</span>
    <div class="view-toggle">
      <button class="toggle-btn active" onclick="switchView('list',this)">📋 列表</button>
      <button class="toggle-btn" onclick="switchView('floor',this)">🏠 平面</button>
    </div>
  </div>
  <div class="page" id="roomList"></div>
  <div class="bottom-nav">
    <div class="nav-item" onclick="location.href='../dashboard/index.html'"><div class="nav-icon">📊</div><div class="nav-label">工作台</div></div>
    <div class="nav-item active"><div class="nav-icon">🏠</div><div class="nav-label">房态</div></div>
    <div class="nav-item" onclick="location.href='../device-monitor/index.html'"><div class="nav-icon">📱</div><div class="nav-label">设备</div></div>
    <div class="nav-item" onclick="location.href='../scene-control/index.html'"><div class="nav-icon">🎬</div><div class="nav-label">场景</div></div>
    <div class="nav-item" onclick="location.href='../cleaning-task/index.html'"><div class="nav-icon">🧹</div><div class="nav-label">保洁</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="actionModal"><div class="modal" id="modalContent"></div></div>

<script>
// Load rooms from localStorage or use defaults
const defaultRooms = [
  { roomId:"RM001", name:"大会议室", type:"bookable", status:"InUse", customerName:"李明", customerPhone:"138****1234", time:"13:00-15:00", remaining:80 },
  { roomId:"RM002", name:"中茶室A", type:"bookable", status:"Cleaning", customerName:"", customerPhone:"", time:"上单:王芳 10:00-10:30", cleaningStaff:"小芳", cleaningProgress:60 },
  { roomId:"RM003", name:"中茶室B", type:"bookable", status:"Active", customerName:"", customerPhone:"", time:"" },
  { roomId:"RM004", name:"大茶室C", type:"bookable", status:"InUse", customerName:"张华", customerPhone:"139****5678", time:"10:00-11:30", remaining:45 },
  { roomId:"RM005", name:"展厅", type:"Exhibition", status:"Active", customerName:"", time:"开放区域" },
  { roomId:"RM006", name:"工作间", type:"Workspace", status:"Active", customerName:"", time:"员工专用" },
];

function loadRooms() {
  try {
    const saved = localStorage.getItem('mp_staff_rooms');
    if (saved) { const arr = JSON.parse(saved); if (arr.length) return arr; }
  } catch(e) {}
  return JSON.parse(JSON.stringify(defaultRooms));
}

function saveRooms() {
  localStorage.setItem('mp_staff_rooms', JSON.stringify(rooms));
}

let rooms = loadRooms();

const statusLabels = { InUse:'使用中', Booked:'已预定', Active:'空闲', Cleaning:'待打扫', Maintenance:'维修中' };
const statusBadges = { InUse:'badge-inuse', Booked:'badge-booked', Active:'badge-active', Cleaning:'badge-cleaning', Maintenance:'badge-maintenance' };
const lockDeviceMap = { RM001:'DEV001', RM002:'DEV008', RM003:'DEV014', RM004:'DEV020' };

let currentAction = null;
let currentView = 'list';

function renderRooms() {
  const container = document.getElementById('roomList');
  if (currentView === 'floor') { renderFloorPlan(container); return; }

  container.innerHTML = rooms.map(r => {
    let detailHtml = '', actionsHtml = '';

    if (r.status === 'InUse') {
      detailHtml = `<div class="room-detail-row"><span>客人: ${r.customerName}</span><span>${r.customerPhone}</span></div>
        <div class="room-detail-row"><span>时段: ${r.time}</span><span>剩余: ${r.remaining}分钟</span></div>`;
      actionsHtml = `<button class="action-btn success" onclick="quickAction('${r.roomId}','unlock')">开门</button>
        <button class="action-btn primary" onclick="openAction('${r.roomId}','sceneSwitch')">场景切换</button>
        <button class="action-btn danger" onclick="openAction('${r.roomId}','forceCheckout')">强制退房</button>`;
    } else if (r.status === 'Booked') {
      const staffTag = r.isStaffBooking ? ' <span style="font-size:11px;background:#f3e5f5;color:#9c27b0;padding:2px 6px;border-radius:4px;font-weight:500;">🏪 店员代订</span>' : '';
      detailHtml = `<div class="room-detail-row"><span>客人: ${r.customerName}${staffTag}</span><span>${r.customerPhone}</span></div>`;
      actionsHtml = `<button class="action-btn success" onclick="quickAction('${r.roomId}','checkin')">确认到店</button>
        <button class="action-btn danger" onclick="openAction('${r.roomId}','cancelBooking')">取消预约</button>`;
    } else if (r.status === 'Cleaning') {
      detailHtml = `<div class="room-detail-row"><span>${r.time}</span></div>
        <div class="cleaning-progress"><span>保洁: ${r.cleaningStaff}</span><div class="cleaning-bar"><div class="cleaning-fill" style="width:${r.cleaningProgress}%"></div></div><span>${r.cleaningProgress}%</span></div>`;
      actionsHtml = `<button class="action-btn success" onclick="quickAction('${r.roomId}','completeCleaning')">确认打扫完成</button>
        <button class="action-btn warning" onclick="openAction('${r.roomId}','setMaintenance')">设为维修</button>`;
    } else if (r.status === 'Maintenance') {
      detailHtml = `<div class="room-detail-row"><span>维修中</span></div>`;
      actionsHtml = `<button class="action-btn success" onclick="quickAction('${r.roomId}','restoreActive')">恢复空闲</button>`;
    }

    // Non-bookable rooms have limited actions
    if (r.type === 'Exhibition' || r.type === 'Workspace') {
      if (r.status === 'Active' || r.status === 'InUse') {
            actionsHtml = (r.type === 'Exhibition' ? '<span class="note">开放区域，自由使用</span>' : '<span class="note">员工专用空间</span>') + ' <button class="action-btn primary" onclick="location.href=\'../device-control/index.html?roomId=' + r.roomId + '&roomName=' + encodeURIComponent(r.name) + '\'">设备控制</button>';
        if (r.status === 'Active') actionsHtml += `<button class="action-btn warning" style="margin-left:6px;" onclick="openAction('${r.roomId}','setMaintenance')">设为维修</button>`;
      }
      detailHtml = `<div class="room-detail-row"><span>${r.time}</span></div>`;
    } else if (r.status === 'Active') {
      actionsHtml = `<button class="action-btn primary" onclick="openAction('${r.roomId}','setBooked')">📋 代预订</button>
        <button class="action-btn warning" onclick="openAction('${r.roomId}','setMaintenance')">设为维修</button>`;
    }

    return `<div class="room-card ${r.status.toLowerCase()}">
      <div class="room-header"><span class="room-name">${r.name}</span>
        <span class="room-status-badge ${statusBadges[r.status]}">${statusLabels[r.status]}</span></div>
      <div class="room-detail">${detailHtml}</div>
      <div class="room-actions">${actionsHtml}</div></div>`;
  }).join('');
}

function switchView(view, el) {
  currentView = view;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderRooms();
}

function renderFloorPlan(container) {
  const roomColors = { InUse:'#e8f5e9', Booked:'#f3e5f5', Active:'#e3f2fd', Cleaning:'#fff3e0', Maintenance:'#ffebee' };
  const emoji = { InUse:'🟢', Booked:'🟣', Active:'🔵', Cleaning:'🟡', Maintenance:'🔴' };
  container.innerHTML = `
    <div style="background:#fff;border-radius:14px;padding:16px;">
      <div style="font-size:14px;font-weight:600;margin-bottom:12px;">🏠 盈隆店平面图</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        ${rooms.map(r => `
          <div onclick="location.href='../device-control/index.html?roomId=${r.roomId}&roomName=${encodeURIComponent(r.name)}'" style="cursor:pointer;background:${roomColors[r.status]};border-radius:10px;padding:12px;text-align:center;border:2px solid ${r.status==='InUse'?'#00a870':r.status==='Cleaning'?'#e37318':r.status==='Maintenance'?'#d54941':'#e0e0e0'};">
            <div style="font-size:20px;">${emoji[r.status]}</div>
            <div style="font-size:13px;font-weight:600;margin-top:4px;">${r.name}</div>
            <div style="font-size:11px;color:#999;">${statusLabels[r.status]}${r.time?' '+r.time:''}</div>
          </div>`).join('')}
      </div>
      <div style="font-size:11px;color:#999;margin-top:12px;text-align:center;">注: 正式版将基于盈隆店实际平面布局绘制</div>
    </div>`;
}

function openAction(roomId, action) {
  currentAction = { roomId, action };
  const room = rooms.find(r => r.roomId === roomId);
  const modal = document.getElementById('modalContent');

  if (action === 'setBooked') {
    const tOpts = [];
    for (let h = 9; h <= 22; h++) {
      tOpts.push(`${String(h).padStart(2,'0')}:00`);
      if (h < 22) tOpts.push(`${String(h).padStart(2,'0')}:30`);
    }
    const th = tOpts.map(t => `<option value="${t}">${t}</option>`).join('');
    modal.innerHTML = `<h3>📋 代预订 - ${room.name}</h3>
      <p style="font-size:12px;color:#999;margin-bottom:10px;">为客人手动创建预约订单</p>
      <div style="font-size:13px;font-weight:600;color:#333;margin-bottom:4px;">客人信息</div>
      <input placeholder="客人姓名 *" id="bkCustName">
      <input placeholder="联系电话 *" id="bkCustPhone" type="tel">
      <div style="font-size:13px;font-weight:600;color:#333;margin:8px 0 4px;">时段选择</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;" id="durationGroup">
        <button class="duration-btn selected" data-dur="2" onclick="selectDuration(this,2)">2小时<br><small>¥120</small></button>
        <button class="duration-btn" data-dur="3" onclick="selectDuration(this,3)">3小时<br><small>¥180</small></button>
        <button class="duration-btn" data-dur="4" onclick="selectDuration(this,4)">4小时<br><small>¥240</small></button>
        <button class="duration-btn" data-dur="custom" onclick="selectDuration(this,'custom')">自定义<br><small>¥60/时</small></button>
      </div>
      <div id="customTimePicker" style="display:none;margin-top:6px;">
        <span style="display:flex;align-items:center;gap:4px;">
          <select class="time-select" id="bkStartTime">${th}</select>
          <span style="color:#666;font-size:13px;">至</span>
          <select class="time-select" id="bkEndTime">${th}</select>
        </span>
      </div>
      <div style="font-size:13px;font-weight:600;color:#333;margin:8px 0 4px;">支付状态</div>
      <div style="display:flex;gap:6px;" id="paymentGroup">
        <label class="payment-radio selected" data-pay="unpaid" onclick="selectPayment(this)">未支付</label>
        <label class="payment-radio" data-pay="paid" onclick="selectPayment(this)">已支付</label>
        <label class="payment-radio" data-pay="room" onclick="selectPayment(this)">挂账到房间</label>
      </div>
      <div style="font-size:13px;font-weight:600;color:#333;margin:8px 0 4px;">备注</div>
      <textarea placeholder="备注信息（选填）" id="bkNotes" style="resize:vertical;"></textarea>
      <div class="modal-buttons"><button class="modal-btn cancel" onclick="hideModal()">取消</button><button class="modal-btn confirm" onclick="doProxyBooking()">确认代预订</button></div>`;
  } else if (action === 'setMaintenance') {
    modal.innerHTML = `<h3>设为维修 - ${room.name}</h3>
      <p style="font-size:12px;color:#999;">标记房间为维修状态，暂停使用</p>
      <textarea placeholder="维修原因 * (≥5字)" id="reason"></textarea><input placeholder="预计恢复时间" id="restoreTime">
      <div class="modal-buttons"><button class="modal-btn cancel" onclick="hideModal()">取消</button><button class="modal-btn warning" onclick="doAction()">确认设为维修</button></div>`;
  } else if (action === 'forceCheckout') {
    modal.innerHTML = `<h3>⚠ 强制退房 - ${room.name}</h3>
      <p style="color:#d54941;">将结束当前订单、触发节能关闭所有设备，房间转为待打扫。此操作将被审计。</p>
      <textarea placeholder="操作原因 * (≥5字)" id="reason"></textarea>
      <div class="modal-buttons"><button class="modal-btn cancel" onclick="hideModal()">取消</button><button class="modal-btn danger" onclick="doAction()">确认强制退房</button></div>`;
  } else if (action === 'cancelBooking') {
    modal.innerHTML = `<h3>取消预约 - ${room.name}</h3><p style="font-size:13px;color:#666;">将取消当前预约，房间恢复空闲</p>
      <textarea placeholder="取消原因 *" id="reason"></textarea>
      <div class="modal-buttons"><button class="modal-btn cancel" onclick="hideModal()">保留</button><button class="modal-btn danger" onclick="doAction()">确认取消</button></div>`;
  } else if (action === 'sceneSwitch') {
    modal.innerHTML = `<h3>场景切换 - ${room.name}</h3><p style="font-size:13px;color:#666;">手动触发场景（覆盖当前自动场景）</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
        <button class="modal-btn confirm" onclick="doScene('品茗')" style="background:#e8f5e9;color:#00a870;">🍵 品茗</button>
        <button class="modal-btn confirm" onclick="doScene('会议')">💡 会议</button>
        <button class="modal-btn confirm" onclick="doScene('K歌')" style="background:#fff3e0;color:#e37318;">🎤 K歌</button>
        <button class="modal-btn confirm" onclick="doScene('蓝牙音乐')" style="background:#e3f2fd;color:#0052d9;">🎵 蓝牙音乐</button>
        <button class="modal-btn confirm" onclick="doScene('节能')" style="background:#ffebee;color:#d54941;">♻ 节能</button>
      </div><button class="modal-btn cancel" style="margin-top:8px;width:100%;" onclick="hideModal()">取消</button>`;
  }
  document.getElementById('actionModal').style.display = 'flex';
}

function doScene(name) { showToast(`${rooms.find(r => r.roomId === currentAction.roomId)?.name} 已切换到${name}模式`); hideModal(); }

function quickAction(roomId, action) {
  const room = rooms.find(r => r.roomId === roomId);
  if (action === 'checkin') { room.status = 'InUse'; room.customerName = room.customerName || '到店客人'; room.remaining = 90; showToast(`${room.name} 已确认到店，触发欢迎场景`); }
  else if (action === 'unlock') { const lockId = lockDeviceMap[roomId]; if (lockId) { location.href = `../device-control/index.html?deviceId=${lockId}&type=Lock&roomId=${roomId}&roomName=${encodeURIComponent(room.name)}`; } }
  else if (action === 'completeCleaning') { room.status = 'Active'; room.cleaningStaff = ''; room.cleaningProgress = 0; showToast(`${room.name} 保洁完成，房间恢复空闲`); }
  else if (action === 'restoreActive') { room.status = 'Active'; showToast(`${room.name} 维修完成，已恢复空闲`); }
  saveRooms(); renderRooms();
}

function doAction() {
  const room = rooms.find(r => r.roomId === currentAction.roomId);
  const reason = document.getElementById('reason')?.value || '';
  if (currentAction.action === 'setMaintenance') {
    if (reason.length < 5) { showToast('维修原因至少5字'); return; }
    room.status = 'Maintenance'; showToast(`${room.name} 已设为维修中`);
  } else if (currentAction.action === 'forceCheckout') {
    if (reason.length < 5) { showToast('强制退房原因至少5字'); return; }
    room.status = 'Cleaning'; room.cleaningStaff = '待分配'; room.cleaningProgress = 0;
    showToast(`${room.name} 已强制退房，转待打扫，已记录审计日志`);
  } else if (currentAction.action === 'cancelBooking') {
    room.status = 'Active'; room.customerName = ''; room.customerPhone = ''; room.time = '';
    showToast(`${room.name} 预约已取消`);
  }
  hideModal(); renderRooms();
}

function selectDuration(btn, value) {
  document.querySelectorAll('#durationGroup .duration-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  const picker = document.getElementById('customTimePicker');
  picker.style.display = (value === 'custom') ? 'block' : 'none';
}

function selectPayment(el) {
  document.querySelectorAll('#paymentGroup .payment-radio').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}

function doProxyBooking() {
  const room = rooms.find(r => r.roomId === currentAction.roomId);
  const name = document.getElementById('bkCustName')?.value?.trim() || '';
  const phone = document.getElementById('bkCustPhone')?.value?.trim() || '';
  const notes = document.getElementById('bkNotes')?.value?.trim() || '';

  if (!name) { showToast('请输入客人姓名'); return; }
  if (!phone) { showToast('请输入联系电话'); return; }
  if (!/^1\d{10}$/.test(phone)) { showToast('请输入正确的11位手机号'); return; }

  // Duration
  const selectedDur = document.querySelector('#durationGroup .duration-btn.selected');
  const durValue = selectedDur ? selectedDur.getAttribute('data-dur') : '2';
  let duration, startTime, endTime, totalAmount;

  if (durValue === 'custom') {
    startTime = document.getElementById('bkStartTime')?.value || '09:00';
    endTime = document.getElementById('bkEndTime')?.value || '11:00';
    const [sh, sm] = startTime.split(':').map(Number);
    const [eh, em] = endTime.split(':').map(Number);
    const startMin = sh * 60 + sm;
    const endMin = eh * 60 + em;
    if (endMin <= startMin) { showToast('结束时间必须晚于开始时间'); return; }
    duration = (endMin - startMin) / 60;
    totalAmount = Math.round(duration * 60);
  } else {
    duration = parseInt(durValue);
    totalAmount = duration * 60;
    // 基于当前时间计算开始时段（向上取整到最近的30分钟）
    const now = new Date();
    let startH = now.getHours();
    let startM = Math.ceil(now.getMinutes() / 30) * 30;
    if (startM >= 60) { startH += 1; startM = 0; }
    if (startH < 9) { startH = 9; startM = 0; }
    if (startH >= 22) { startH = 22; startM = 0; }
    startTime = `${String(startH).padStart(2,'0')}:${String(startM).padStart(2,'0')}`;
    const endH = startH + duration;
    endTime = `${String(endH).padStart(2,'0')}:${String(startM).padStart(2,'0')}`;
  }

  // Payment status
  const payEl = document.querySelector('#paymentGroup .payment-radio.selected');
  const paymentStatus = payEl ? payEl.getAttribute('data-pay') : 'unpaid';

  // Update room
  room.status = 'Booked';
  room.customerName = name;
  room.customerPhone = phone;
  room.time = `${startTime}-${endTime}`;
  room.isStaffBooking = true;

  // Create order
  let orders = [];
  try { orders = JSON.parse(localStorage.getItem('mp_staff_orders') || '[]'); } catch(e) {}
  const order = {
    orderId: 'ORD' + Date.now(),
    roomId: room.roomId,
    roomName: room.name,
    customerName: name,
    customerPhone: phone,
    date: new Date().toISOString().split('T')[0],
    startTime,
    endTime,
    duration,
    totalAmount,
    paymentStatus,
    notes,
    isStaffBooking: true,
    createdAt: new Date().toISOString()
  };
  orders.push(order);
  localStorage.setItem('mp_staff_orders', JSON.stringify(orders));

  saveRooms();
  hideModal();
  renderRooms();
  showToast(`代预订成功！已为 ${name} 预订 ${room.name}，${startTime}-${endTime}`);
}
function hideModal() { document.getElementById('actionModal').style.display = 'none'; currentAction = null; }

function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

renderRooms();
</script>
</body>
</html>
