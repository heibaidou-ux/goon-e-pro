<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>茶品商城</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f5f5f5; display:flex; justify-content:center; padding:20px; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
.phone { width:375px; min-height:812px; background:#fff; border-radius:20px; overflow:hidden; box-shadow:0 4px 24px rgba(0,0,0,.12); display:flex; flex-direction:column; position:relative; }
.page { flex:1; overflow-y:auto; padding-bottom:60px; }
.header { padding:16px; background:#fff; border-bottom:1px solid #f0f0f0; position:sticky; top:0; z-index:10; }
.header-title { font-size:18px; font-weight:700; color:#1a1a1a; text-align:center; }
.cart-badge { position:absolute; right:16px; top:16px; cursor:pointer; font-size:20px; }
.cart-badge .badge { position:absolute; top:-6px; right:-6px; background:#e37318; color:#fff; border-radius:10px; padding:1px 6px; font-size:10px; min-width:18px; text-align:center; }

/* Category Tabs */
.cat-tabs { display:flex; padding:12px 16px; gap:8px; background:#fff; border-bottom:1px solid #f5f5f5; position:sticky; top:57px; z-index:10; }
.cat-tab { flex:1; padding:8px; text-align:center; border-radius:20px; font-size:13px; cursor:pointer; background:#f5f5f5; color:#666; border:none; transition:all .15s; }
.cat-tab.active { background:#07c160; color:#fff; }

/* Products */
.product-list { padding:12px 16px; }
.product-card { display:flex; padding:12px; border-radius:12px; background:#fafafa; margin-bottom:10px; cursor:pointer; }
.product-icon { width:64px; height:64px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:32px; flex-shrink:0; }
.product-body { flex:1; margin-left:12px; }
.product-name { font-size:14px; font-weight:600; color:#333; }
.product-desc { font-size:11px; color:#999; margin-top:2px; }
.product-footer { display:flex; justify-content:space-between; align-items:center; margin-top:8px; }
.product-price { font-size:16px; font-weight:700; color:#e37318; }
.product-price .unit { font-size:11px; font-weight:400; color:#999; }
.qty-ctrl { display:flex; align-items:center; gap:8px; }
.qty-btn { width:26px; height:26px; border-radius:50%; border:1px solid #ddd; background:#fff; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#333; }
.qty-btn:active { background:#f0f0f0; }
.qty-num { font-size:14px; font-weight:600; min-width:20px; text-align:center; color:#333; }

/* Cart View */
.cart-view { display:none; }
.cart-view .cart-header { display:flex; justify-content:space-between; align-items:center; padding:16px; border-bottom:1px solid #f0f0f0; }
.cart-view .cart-header h3 { font-size:16px; }
.cart-empty { text-align:center; padding:60px 20px; color:#ccc; font-size:14px; }
.cart-item { display:flex; align-items:center; padding:12px 16px; border-bottom:1px solid #f5f5f5; }
.cart-item-name { flex:1; font-size:14px; }
.cart-item-price { color:#e37318; font-weight:600; margin-right:12px; font-size:13px; }
.cart-total { padding:16px; text-align:right; font-size:18px; font-weight:700; border-top:1px solid #f0f0f0; }
.cart-total .total-label { font-size:13px; color:#999; }
.cart-total .total-price { color:#e37318; }
.checkout-btn { margin:0 16px 20px; padding:14px; background:#07c160; color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:600; width:calc(100% - 32px); cursor:pointer; }

.bottom-nav { display:flex; border-top:1px solid #eee; background:#fff; position:sticky; bottom:0; }
.nav-item { flex:1; text-align:center; padding:10px 0 6px; cursor:pointer; transition:color .15s; text-decoration:none; }
.nav-item .nav-icon { font-size:20px; }
.nav-item .nav-label { font-size:10px; margin-top:2px; }
.nav-item.active { color:#07c160; }
.nav-item:not(.active) { color:#999; }

.toast { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:100;display:none; }

/* Payment Modal */
.pay-modal-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center; }
.pay-modal { background:#fff;border-radius:14px;padding:24px;width:320px;max-height:90vh;overflow-y:auto;text-align:center; }
.pay-modal h3 { font-size:16px;margin-bottom:12px;color:#333; }
.pay-total { font-size:32px;font-weight:800;color:#e37318;margin:12px 0; }
.pay-items { text-align:left;background:#f9fafb;border-radius:8px;padding:12px;margin-bottom:12px; }
.pay-item-row { display:flex;justify-content:space-between;padding:4px 0;font-size:13px;color:#666; }
.pay-methods { margin:12px 0;text-align:left; }
.pay-method { display:flex;align-items:center;padding:10px 12px;border:1.5px solid #e5e5e5;border-radius:8px;margin-bottom:8px;cursor:pointer;font-size:14px;transition:all .15s; }
.pay-method.selected { border-color:#07c160;background:#f0fdf4; }
.pay-method .pay-method-icon { font-size:20px;margin-right:10px; }
.pay-method .pay-method-name { flex:1; }
.pay-method .pay-method-check { color:#07c160;font-size:16px; }
.pay-modal-btns { display:flex;gap:10px;margin-top:16px; }
.pay-modal-btns button { flex:1;padding:12px;border-radius:8px;border:none;font-size:15px;font-weight:600;cursor:pointer; }
.pay-btn-cancel { background:#f5f5f5;color:#666; }
.pay-btn-confirm { background:#07c160;color:#fff; }
.pay-btn-confirm:disabled { background:#ccc;cursor:not-allowed; }
</style>
</head>
<body>
<div class="phone">
  <!-- Product List View -->
  <div class="page" id="productView">
    <div class="header">
      <div class="header-title">茶品商城</div>
      <div class="cart-badge" onclick="showCart()">
        🛒<span class="badge" id="cartBadge" style="display:none">0</span>
      </div>
    </div>
    <div class="cat-tabs" id="catTabs">
      <button class="cat-tab active" onclick="switchCat('snack')">🍪 茶点</button>
      <button class="cat-tab" onclick="switchCat('tea')">🍃 茶叶</button>
      <button class="cat-tab" onclick="switchCat('ware')">🫖 茶具</button>
    </div>
    <div class="product-list" id="productList"></div>
  </div>

  <!-- Cart View -->
  <div class="page cart-view" id="cartView">
    <div class="cart-header">
      <button style="background:none;border:none;font-size:20px;cursor:pointer;color:#666;" onclick="showProducts()">← 返回</button>
      <h3>购物车</h3>
      <button style="background:none;border:none;font-size:13px;cursor:pointer;color:#e37318;" onclick="clearCart()">清空</button>
    </div>
    <div id="cartItems" style="flex:1;overflow-y:auto;"></div>
    <div class="cart-total">
      <span class="total-label">合计：</span>
      <span class="total-price" id="cartTotalPrice">¥0</span>
    </div>
    <button class="checkout-btn" onclick="checkout()">去结算</button>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="location.href='../home/index.html'"><div class="nav-icon">🏠</div><div class="nav-label">主页</div></div>
    <div class="nav-item" onclick="location.href='../room-detail/index.html'"><div class="nav-icon">📅</div><div class="nav-label">预订</div></div>
    <div class="nav-item active"><div class="nav-icon">🍵</div><div class="nav-label">茶品</div></div>
    <div class="nav-item" onclick="location.href='../my-orders/index.html'"><div class="nav-icon">📋</div><div class="nav-label">订单</div></div>
    <div class="nav-item" onclick="location.href='../member-center/index.html'"><div class="nav-icon">👤</div><div class="nav-label">我的</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- Product Detail Modal -->
<div class="pay-modal-overlay" id="detailModal">
  <div class="pay-modal" style="text-align:left;">
    <div style="text-align:center;font-size:56px;margin-bottom:12px;" id="detailIcon"></div>
    <h3 id="detailName" style="text-align:center;"></h3>
    <p id="detailDesc" style="text-align:center;font-size:13px;color:#666;margin-bottom:8px;"></p>
    <div style="display:flex;justify-content:space-between;align-items:center;background:#f9fafb;border-radius:8px;padding:12px;margin-bottom:16px;">
      <span style="font-size:13px;color:#666;">单价</span>
      <span style="font-size:22px;font-weight:800;color:#e37318;" id="detailPrice"></span>
    </div>
    <div style="text-align:center;margin-bottom:12px;">
      <span style="font-size:12px;color:#999;">数量</span>
      <div class="qty-ctrl" style="justify-content:center;margin-top:6px;">
        <button class="qty-btn" style="width:32px;height:32px;font-size:18px;" onclick="detailQtyDec()">−</button>
        <span class="qty-num" style="font-size:18px;min-width:28px;" id="detailQty">1</span>
        <button class="qty-btn" style="width:32px;height:32px;font-size:18px;" onclick="detailQtyInc()">+</button>
      </div>
    </div>
    <div class="pay-modal-btns">
      <button class="pay-btn-cancel" onclick="hideDetail()">关闭</button>
      <button class="pay-btn-confirm" onclick="detailAddToCart()">加入购物车</button>
    </div>
  </div>
</div>

<!-- Payment Modal -->
<div class="pay-modal-overlay" id="payModal">
  <div class="pay-modal">
    <h3>确认支付</h3>
    <div class="pay-items" id="payItems"></div>
    <div class="pay-total" id="payTotal">¥0</div>
    <div class="pay-methods">
      <div class="pay-method selected" id="payMethodBalance" onclick="selectPayMethod('balance')">
        <span class="pay-method-icon">💰</span>
        <span class="pay-method-name">余额支付</span>
        <span class="pay-method-check" id="payCheckBalance">✓</span>
      </div>
      <div class="pay-method" id="payMethodWechat" onclick="selectPayMethod('wechat')">
        <span class="pay-method-icon">💚</span>
        <span class="pay-method-name">微信支付</span>
        <span class="pay-method-check" id="payCheckWechat" style="visibility:hidden">✓</span>
      </div>
      <div class="pay-method" id="payMethodAlipay" onclick="selectPayMethod('alipay')">
        <span class="pay-method-icon">💙</span>
        <span class="pay-method-name">支付宝</span>
        <span class="pay-method-check" id="payCheckAlipay" style="visibility:hidden">✓</span>
      </div>
    </div>
    <div class="pay-modal-btns">
      <button class="pay-btn-cancel" onclick="cancelPay()">取消</button>
      <button class="pay-btn-confirm" id="payConfirmBtn" onclick="confirmPay()">确认支付</button>
    </div>
  </div>
</div>

<script>
// ── data ──
var products = {
  snack: [
    { id:'S01', name:'绿豆糕', desc:'手工制作 · 清甜细腻', price:38, icon:'🥮', bg:'#fff8e1' },
    { id:'S02', name:'桂花糕', desc:'桂花清香 · 软糯可口', price:42, icon:'🌸', bg:'#fce4ec' },
    { id:'S03', name:'龙井茶酥', desc:'龙井茶粉入馅 · 茶香酥脆', price:48, icon:'🍪', bg:'#e8f5e9' },
    { id:'S04', name:'核桃酥', desc:'传统糕点 · 酥脆香甜', price:35, icon:'🥜', bg:'#efebe9' },
    { id:'S05', name:'陈皮瓜子', desc:'新会陈皮 · 个大饱满', price:28, icon:'🌰', bg:'#fff3e0' },
    { id:'S06', name:'果脯拼盘', desc:'四种果脯 · 酸甜可口', price:58, icon:'🍬', bg:'#f3e5f5' },
  ],
  tea: [
    { id:'T01', name:'明前龙井', desc:'2026年新茶 · 清香甘醇 · 50g', price:168, icon:'🍃', bg:'#e8f5e9' },
    { id:'T02', name:'古树普洱', desc:'勐海古树 · 陈香醇厚 · 357g', price:288, icon:'🪵', bg:'#efebe9' },
    { id:'T03', name:'武夷岩茶', desc:'大红袍 · 岩骨花香 · 100g', price:358, icon:'🏔️', bg:'#fff3e0' },
    { id:'T04', name:'福鼎白茶', desc:'白毫银针 · 清甜回甘 · 50g', price:198, icon:'🌿', bg:'#f1f8e9' },
    { id:'T05', name:'金骏眉', desc:'芽头金毫 · 蜜香甘醇 · 50g', price:328, icon:'🫖', bg:'#fce4ec' },
    { id:'T06', name:'茉莉花茶', desc:'三窨一提 · 花香茶韵 · 100g', price:128, icon:'🌸', bg:'#f3e5f5' },
    { id:'T07', name:'安溪铁观音', desc:'清香型 · 七泡有余香 · 150g', price:238, icon:'🍂', bg:'#e0f2f1' },
    { id:'T08', name:'凤凰单丛', desc:'鸭屎香 · 蜜兰香韵 · 100g', price:398, icon:'🏵️', bg:'#f9fbe7' },
  ],
  ware: [
    { id:'W01', name:'紫砂壶套装', desc:'宜兴紫砂 · 一壶四杯 · 手工制作', price:680, icon:'🫖', bg:'#efebe9' },
    { id:'W02', name:'白瓷盖碗', desc:'德化白瓷 · 薄胎透光 · 150ml', price:168, icon:'🫗', bg:'#f5f5f5' },
    { id:'W03', name:'玻璃公道杯', desc:'高硼硅玻璃 · 耐高温 · 300ml', price:89, icon:'🥛', bg:'#e3f2fd' },
    { id:'W04', name:'竹制茶盘', desc:'天然楠竹 · 防水防霉 · 60×35cm', price:258, icon:'🎋', bg:'#e8f5e9' },
    { id:'W05', name:'茶道六君子', desc:'六件套 · 黑檀木 · 礼盒装', price:128, icon:'🎯', bg:'#fafafa' },
    { id:'W06', name:'电陶炉茶炉', desc:'静音设计 · 自动上水 · 文武火', price:458, icon:'🔥', bg:'#fff3e0' },
  ],
};

var currentCat = 'snack';
var cart = JSON.parse(localStorage.getItem('mp_tea_cart') || '[]');
var detailProduct = null;
var detailQty = 1;

// ── init ──
// Merge home page cart items if any
renderProducts();
renderCartBadge();

// Check if ?tab=cart
if (window.location.search.indexOf('tab=cart') >= 0) {
  showCart();
}

function switchCat(cat) {
  currentCat = cat;
  var tabs = document.querySelectorAll('.cat-tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  var tabIndex = cat === 'snack' ? 0 : cat === 'tea' ? 1 : 2;
  tabs[tabIndex].classList.add('active');
  renderProducts();
}

function getCartQty(productId) {
  for (var i = 0; i < cart.length; i++) {
    if (cart[i].id === productId) return cart[i].qty;
  }
  return 0;
}

function addToCart(product) {
  var existing = null;
  for (var i = 0; i < cart.length; i++) {
    if (cart[i].id === product.id) { existing = cart[i]; break; }
  }
  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({ id:product.id, name:product.name, price:product.price, qty:1, icon:product.icon });
  }
  saveCart();
  renderProducts();
  renderCartBadge();
}

function removeFromCart(product) {
  for (var i = 0; i < cart.length; i++) {
    if (cart[i].id === product.id) {
      cart[i].qty -= 1;
      if (cart[i].qty <= 0) cart.splice(i, 1);
      break;
    }
  }
  saveCart();
  renderProducts();
  renderCartBadge();
}

function saveCart() {
  localStorage.setItem('mp_tea_cart', JSON.stringify(cart));
}

function renderCartBadge() {
  var total = 0;
  for (var i = 0; i < cart.length; i++) total += cart[i].qty;
  var badge = document.getElementById('cartBadge');
  if (badge) {
    badge.textContent = total;
    badge.style.display = total > 0 ? '' : 'none';
  }
}

function renderProducts() {
  var list = products[currentCat];
  var html = '';
  for (var i = 0; i < list.length; i++) {
    var p = list[i];
    var qty = getCartQty(p.id);
    html += '<div class="product-card" onclick="showProductDetail(products.' + currentCat + '[' + i + '])">' +
      '<div class="product-icon" style="background:' + p.bg + '">' + p.icon + '</div>' +
      '<div class="product-body">' +
        '<div class="product-name">' + p.name + '</div>' +
        '<div class="product-desc">' + p.desc + '</div>' +
        '<div class="product-footer">' +
          '<span class="product-price">¥' + p.price + '<span class="unit">/件</span></span>' +
          (qty > 0
            ? '<div class="qty-ctrl"><button class="qty-btn" onclick="event.stopPropagation();removeFromCart(products.' + currentCat + '[' + i + '])">−</button><span class="qty-num">' + qty + '</span><button class="qty-btn" onclick="event.stopPropagation();addToCart(products.' + currentCat + '[' + i + '])">+</button></div>'
            : '<button style="padding:4px 14px;border-radius:16px;background:#07c160;color:#fff;border:none;font-size:12px;cursor:pointer;" onclick="event.stopPropagation();addToCart(products.' + currentCat + '[' + i + '])">+ 加购</button>') +
        '</div>' +
      '</div>' +
    '</div>';
  }
  document.getElementById('productList').innerHTML = html;
}

function showCart() {
  document.getElementById('productView').style.display = 'none';
  document.getElementById('cartView').style.display = 'block';
  renderCart();
}

function showProducts() {
  document.getElementById('productView').style.display = 'block';
  document.getElementById('cartView').style.display = 'none';
}

function renderCart() {
  if (cart.length === 0) {
    document.getElementById('cartItems').innerHTML = '<div class="cart-empty">🛒<br>购物车是空的<br><span style="font-size:12px;">快去选些好茶吧</span></div>';
    document.getElementById('cartTotalPrice').textContent = '¥0';
    return;
  }
  var html = '';
  var total = 0;
  for (var i = 0; i < cart.length; i++) {
    var item = cart[i];
    var subtotal = item.price * item.qty;
    total += subtotal;
    html += '<div class="cart-item">' +
      '<span style="font-size:24px;margin-right:10px;">' + (item.icon || '🛒') + '</span>' +
      '<span class="cart-item-name">' + item.name + '</span>' +
      '<div class="qty-ctrl">' +
        '<button class="qty-btn" onclick="cartQtyDec(\'' + item.id + '\')">−</button>' +
        '<span class="qty-num">' + item.qty + '</span>' +
        '<button class="qty-btn" onclick="cartQtyInc(\'' + item.id + '\')">+</button>' +
      '</div>' +
      '<span class="cart-item-price">¥' + subtotal + '</span>' +
      '</div>';
  }
  document.getElementById('cartItems').innerHTML = html;
  document.getElementById('cartTotalPrice').textContent = '¥' + total;
}

function cartQtyInc(id) {
  for (var i = 0; i < cart.length; i++) {
    if (cart[i].id === id) { cart[i].qty += 1; break; }
  }
  saveCart();
  renderCart();
  renderCartBadge();
}

function cartQtyDec(id) {
  for (var i = 0; i < cart.length; i++) {
    if (cart[i].id === id) {
      cart[i].qty -= 1;
      if (cart[i].qty <= 0) cart.splice(i, 1);
      break;
    }
  }
  saveCart();
  renderCart();
  renderCartBadge();
  if (cart.length === 0) showProducts();
}

function clearCart() {
  cart = [];
  saveCart();
  renderCart();
  renderCartBadge();
  showProducts();
  showToast('购物车已清空');
}

function checkout() {
  if (cart.length === 0) { showToast('购物车为空'); return; }
  showPayModal();
}

var payMethod = 'balance';

function showPayModal() {
  var total = 0;
  var html = '';
  for (var i = 0; i < cart.length; i++) {
    var item = cart[i];
    var subtotal = item.price * item.qty;
    total += subtotal;
    html += '<div class="pay-item-row"><span>' + item.name + ' ×' + item.qty + '</span><span>¥' + subtotal + '</span></div>';
  }
  document.getElementById('payItems').innerHTML = html;
  document.getElementById('payTotal').textContent = '¥' + total;
  payMethod = 'balance';
  selectPayMethod('balance');
  document.getElementById('payModal').style.display = 'flex';
}

function selectPayMethod(method) {
  payMethod = method;
  ['balance','wechat','alipay'].forEach(function(m) {
    var el = document.getElementById('payMethod' + m.charAt(0).toUpperCase() + m.slice(1));
    var check = document.getElementById('payCheck' + m.charAt(0).toUpperCase() + m.slice(1));
    if (el) el.classList.toggle('selected', m === method);
    if (check) check.style.visibility = m === method ? 'visible' : 'hidden';
  });
}

function confirmPay() {
  var total = 0;
  var items = [];
  for (var i = 0; i < cart.length; i++) {
    total += cart[i].price * cart[i].qty;
    items.push({ name: cart[i].name, qty: cart[i].qty, price: cart[i].price, icon: cart[i].icon });
  }

  // Check balance if paying with balance
  if (payMethod === 'balance') {
    var user = JSON.parse(localStorage.getItem('mp_user') || 'null');
    var balance = user ? (user.balance || 0) : 0;
    if (balance < total) {
      showToast('余额不足（余额¥' + balance + '），请选择其他支付方式');
      return;
    }
    user.balance -= total;
    localStorage.setItem('mp_user', JSON.stringify(user));
  }

  // Determine if order needs shipping (tea/ware = shipping, snack = completed)
  // Check if any item is a tea or ware product (those need shipping)
  var needsShipping = false;
  for (var i = 0; i < cart.length; i++) {
    var cid = cart[i].id;
    if (cid && (cid.charAt(0) === 'T' || cid.charAt(0) === 'W')) { needsShipping = true; break; }
  }
  var orderStatus = needsShipping ? 'Shipping' : 'Completed';

  // Create shop order with proper item structure
  var shopOrders = JSON.parse(localStorage.getItem('mp_shop_orders') || '[]');
  var orderId = 'SH' + Date.now();
  var now = new Date();
  var dateStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  var timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  shopOrders.unshift({
    orderId: orderId,
    items: items,
    totalAmount: total,
    status: orderStatus,
    createdAt: now.toISOString(),
    date: dateStr,
    time: timeStr,
    payment: payMethod === 'balance' ? '余额支付' : payMethod === 'wechat' ? '微信支付' : '支付宝',
    type: 'shop'
  });
  localStorage.setItem('mp_shop_orders', JSON.stringify(shopOrders));

  // Clear cart
  cart = [];
  saveCart();
  renderCartBadge();
  showProducts();
  renderCart();
  document.getElementById('payModal').style.display = 'none';
  var statusMsg = needsShipping ? '待发货' : '已完成';
  showToast('支付成功！订单' + statusMsg + '，单号：' + orderId);
}

function cancelPay() {
  document.getElementById('payModal').style.display = 'none';
}

// ── Product Detail ──
function showProductDetail(product) {
  detailProduct = product;
  detailQty = 1;
  document.getElementById('detailIcon').textContent = product.icon;
  document.getElementById('detailName').textContent = product.name;
  document.getElementById('detailDesc').textContent = product.desc;
  document.getElementById('detailPrice').textContent = '¥' + product.price;
  document.getElementById('detailQty').textContent = '1';
  document.getElementById('detailModal').style.display = 'flex';
}

function hideDetail() {
  document.getElementById('detailModal').style.display = 'none';
  detailProduct = null;
}

function detailQtyInc() {
  detailQty++;
  document.getElementById('detailQty').textContent = detailQty;
}

function detailQtyDec() {
  if (detailQty > 1) { detailQty--; document.getElementById('detailQty').textContent = detailQty; }
}

function detailAddToCart() {
  if (!detailProduct) return;
  var existing = null;
  for (var i = 0; i < cart.length; i++) {
    if (cart[i].id === detailProduct.id) { existing = cart[i]; break; }
  }
  if (existing) {
    existing.qty += detailQty;
  } else {
    cart.push({ id: detailProduct.id, name: detailProduct.name, price: detailProduct.price, qty: detailQty, icon: detailProduct.icon });
  }
  saveCart();
  renderProducts();
  renderCartBadge();
  hideDetail();
  showToast(detailProduct.name + ' ×' + detailQty + ' 已加入购物车');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 2000);
}
</script>
