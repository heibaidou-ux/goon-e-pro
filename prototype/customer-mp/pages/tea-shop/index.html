<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>茶品商城</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f5f5f5; display:flex; justify-content:center; padding:20px; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
.phone { width:375px; min-height:812px; background:#fff; border-radius:20px; overflow:hidden; box-shadow:0 4px 24px rgba(0,0,0,.12); display:flex; flex-direction:column; position:relative; }
.page { flex:1; overflow-y:auto; padding-bottom:60px; position:relative; }
.header { padding:16px; background:#fff; border-bottom:1px solid #f0f0f0; position:sticky; top:0; z-index:10; }
.header-title { font-size:18px; font-weight:700; color:#1a1a1a; text-align:center; }
.cart-badge { position:absolute; right:16px; top:16px; cursor:pointer; font-size:20px; }
.cart-badge .badge { position:absolute; top:-6px; right:-6px; background:#e37318; color:#fff; border-radius:10px; padding:1px 6px; font-size:10px; min-width:18px; text-align:center; }

/* Room context banner */
.room-banner { background:#f0fdf4; padding:10px 16px; border-bottom:1px solid #dcedc8; display:flex; align-items:center; gap:8px; font-size:13px; color:#333; }
.room-banner-icon { font-size:18px; }
.room-banner-text { flex:1; }
.room-banner-close { color:#999; cursor:pointer; font-size:16px; padding:0 4px; }

/* Category Tabs */
.cat-tabs { display:flex; padding:12px 16px; gap:8px; background:#fff; border-bottom:1px solid #f5f5f5; position:sticky; top:57px; z-index:10; }
.cat-tab { flex:1; padding:8px; text-align:center; border-radius:20px; font-size:13px; cursor:pointer; background:#f5f5f5; color:#666; border:none; transition:all .15s; }
.cat-tab.active { background:#07c160; color:#fff; }

/* Products */
.product-list { padding:12px 16px; }
.product-card { display:flex; padding:12px; border-radius:12px; background:#fafafa; margin-bottom:10px; cursor:pointer; }
.product-img { width:64px; height:64px; border-radius:10px; object-fit:cover; flex-shrink:0; background:#f0f0f0; }
.product-img-placeholder { width:64px; height:64px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:32px; flex-shrink:0; }
.product-body { flex:1; margin-left:12px; }
.product-name { font-size:14px; font-weight:600; color:#333; }
.product-spec { font-size:11px; color:#bbb; margin-top:1px; }
.product-desc { font-size:11px; color:#999; margin-top:2px; }
.product-footer { display:flex; justify-content:space-between; align-items:center; margin-top:8px; }
.product-price { font-size:16px; font-weight:700; color:#e37318; }
.product-price .unit { font-size:11px; font-weight:400; color:#999; }
.qty-ctrl { display:flex; align-items:center; gap:8px; }
.qty-btn { width:26px; height:26px; border-radius:50%; border:1px solid #ddd; background:#fff; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#333; }
.qty-btn:active { background:#f0f0f0; }
.qty-num { font-size:14px; font-weight:600; min-width:20px; text-align:center; color:#333; }

/* Cart View */
.cart-view { display:none; }
.cart-view .cart-header { display:flex; justify-content:space-between; align-items:center; padding:16px; border-bottom:1px solid #f0f0f0; }
.cart-view .cart-header h3 { font-size:16px; }
.cart-empty { text-align:center; padding:60px 20px; color:#ccc; font-size:14px; }
.cart-item { display:flex; align-items:center; padding:12px 16px; border-bottom:1px solid #f5f5f5; }
.cart-item-name { flex:1; font-size:14px; }
.cart-item-price { color:#e37318; font-weight:600; margin-right:12px; font-size:13px; }
.cart-total { padding:16px; text-align:right; font-size:18px; font-weight:700; border-top:1px solid #f0f0f0; }
.cart-total .total-label { font-size:13px; color:#999; }
.cart-total .total-price { color:#e37318; }
.checkout-btn { margin:0 16px 20px; padding:14px; background:#07c160; color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:600; width:calc(100% - 32px); cursor:pointer; }

.bottom-nav { display:flex; border-top:1px solid #eee; background:#fff; position:sticky; bottom:0; }
.nav-item { flex:1; text-align:center; padding:10px 0 6px; cursor:pointer; transition:color .15s; text-decoration:none; }
.nav-item .nav-icon { font-size:20px; }
.nav-item .nav-label { font-size:10px; margin-top:2px; }
.nav-item.active { color:#07c160; }
.nav-item:not(.active) { color:#999; }

.toast { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:100;display:none; }

/* Payment Modal */
.pay-modal-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center; }
.pay-modal { background:#fff;border-radius:14px;padding:24px;width:320px;max-height:90vh;overflow-y:auto;text-align:center; }
.pay-modal h3 { font-size:16px;margin-bottom:12px;color:#333; }
.pay-total { font-size:32px;font-weight:800;color:#e37318;margin:12px 0; }
.pay-items { text-align:left;background:#f9fafb;border-radius:8px;padding:12px;margin-bottom:12px; }
.pay-item-row { display:flex;justify-content:space-between;padding:4px 0;font-size:13px;color:#666; }
.pay-methods { margin:12px 0;text-align:left; }
.pay-method { display:flex;align-items:center;padding:10px 12px;border:1.5px solid #e5e5e5;border-radius:8px;margin-bottom:8px;cursor:pointer;font-size:14px;transition:all .15s; }
.pay-method.selected { border-color:#07c160;background:#f0fdf4; }
.pay-method .pay-method-icon { font-size:20px;margin-right:10px; }
.pay-method .pay-method-name { flex:1; }
.pay-method .pay-method-check { color:#07c160;font-size:16px; }
.pay-modal-btns { display:flex;gap:10px;margin-top:16px; }
.pay-modal-btns button { flex:1;padding:12px;border-radius:8px;border:none;font-size:15px;font-weight:600;cursor:pointer; }
.pay-btn-cancel { background:#f5f5f5;color:#666; }
.pay-btn-confirm { background:#07c160;color:#fff; }
.pay-btn-confirm:disabled { background:#ccc;cursor:not-allowed; }

/* Story section in detail modal */
.story-section { background:#f0fdf4;border-radius:8px;padding:10px;margin:10px 0;text-align:left; }
.story-section .story-title { font-size:12px;font-weight:600;color:#558b2f;margin-bottom:4px; }
.story-section .story-text { font-size:12px;color:#666;line-height:1.6; }
.story-section .story-origin { font-size:11px;color:#999;margin-top:4px; }
.tips-row { display:flex;flex-wrap:wrap;gap:4px;margin-top:6px; }
.tip-tag { background:#e8f5e9;border-radius:10px;padding:2px 8px;font-size:10px;color:#558b2f; }
</style>
</head>
<body>
<div class="phone">
  <!-- Product List View -->
  <div class="page" id="productView">
    <div class="header">
      <div class="header-title">茶品商城</div>
      <div class="cart-badge" onclick="showCart()">
        🛒<span class="badge" id="cartBadge" style="display:none">0</span>
      </div>
    </div>

    <!-- Room context banner -->
    <div class="room-banner" id="roomBanner" style="display:none">
      <span class="room-banner-icon">📍</span>
      <span class="room-banner-text" id="roomBannerText"></span>
      <span class="room-banner-close" onclick="closeRoomBanner()">✕</span>
    </div>

    <div class="cat-tabs" id="catTabs">
    </div>
    <div class="product-list" id="productList"></div>
  </div>

  <!-- Cart View -->
  <div class="page cart-view" id="cartView">
    <div class="cart-header">
      <button style="background:none;border:none;font-size:20px;cursor:pointer;color:#666;" onclick="showProducts()">← 返回</button>
      <h3>购物车</h3>
      <button style="background:none;border:none;font-size:13px;cursor:pointer;color:#e37318;" onclick="clearCart()">清空</button>
    </div>
    <div id="cartItems" style="flex:1;overflow-y:auto;"></div>
    <div class="cart-total">
      <span class="total-label">合计：</span>
      <span class="total-price" id="cartTotalPrice">¥0</span>
    </div>
    <button class="checkout-btn" onclick="checkout()">去结算</button>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="location.href='../home/index.html'"><div class="nav-icon">🏠</div><div class="nav-label">主页</div></div>
    <div class="nav-item" onclick="location.href='../room-detail/index.html'"><div class="nav-icon">📅</div><div class="nav-label">预订</div></div>
    <div class="nav-item active"><div class="nav-icon">🍵</div><div class="nav-label">茶品</div></div>
    <div class="nav-item" onclick="location.href='../my-orders/index.html'"><div class="nav-icon">📋</div><div class="nav-label">订单</div></div>
    <div class="nav-item" onclick="location.href='../member-center/index.html'"><div class="nav-icon">👤</div><div class="nav-label">我的</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- Product Detail Modal -->
<div class="pay-modal-overlay" id="detailModal">
  <div class="pay-modal" style="text-align:left;">
    <div style="text-align:center;border-radius:10px;overflow:hidden;margin-bottom:12px;height:160px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;position:relative;">
      <img id="detailImg" style="width:100%;height:100%;object-fit:cover;display:none;" />
      <div id="detailPlaceholder" style="font-size:56px;display:flex;"></div>
    </div>
    <h3 id="detailName" style="text-align:center;"></h3>
    <div id="detailSpec" style="text-align:center;font-size:12px;color:#bbb;margin-bottom:4px;"></div>
    <p id="detailDesc" style="text-align:center;font-size:13px;color:#666;margin-bottom:8px;"></p>
    <!-- Story section -->
    <div class="story-section" id="storySection" style="display:none;">
      <div class="story-title">📖 产品故事</div>
      <div class="story-text" id="storyText"></div>
      <div class="story-origin" id="storyOrigin"></div>
      <div class="tips-row" id="tipsRow"></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;background:#f9fafb;border-radius:8px;padding:12px;margin-bottom:16px;">
      <span style="font-size:13px;color:#666;">单价</span>
      <span style="font-size:22px;font-weight:800;color:#e37318;" id="detailPrice"></span>
    </div>
    <div style="text-align:center;margin-bottom:12px;">
      <span style="font-size:12px;color:#999;">数量</span>
      <div class="qty-ctrl" style="justify-content:center;margin-top:6px;">
        <button class="qty-btn" style="width:32px;height:32px;font-size:18px;" onclick="detailQtyDec()">−</button>
        <span class="qty-num" style="font-size:18px;min-width:28px;" id="detailQty">1</span>
        <button class="qty-btn" style="width:32px;height:32px;font-size:18px;" onclick="detailQtyInc()">+</button>
      </div>
    </div>
    <div class="pay-modal-btns">
      <button class="pay-btn-cancel" onclick="hideDetail()">关闭</button>
      <button class="pay-btn-confirm" onclick="detailAddToCart()">加入购物车</button>
    </div>
  </div>
</div>

<!-- Payment Modal -->
<div class="pay-modal-overlay" id="payModal">
  <div class="pay-modal">
    <h3>确认支付</h3>
    <div class="pay-items" id="payItems"></div>
    <div class="pay-total" id="payTotal">¥0</div>
    <div class="pay-methods">
      <div class="pay-method selected" id="payMethodBalance" onclick="selectPayMethod('balance')">
        <span class="pay-method-icon">💰</span>
        <span class="pay-method-name">余额支付</span>
        <span class="pay-method-check" id="payCheckBalance">✓</span>
      </div>
      <div class="pay-method" id="payMethodWechat" onclick="selectPayMethod('wechat')">
        <span class="pay-method-icon">💚</span>
        <span class="pay-method-name">微信支付</span>
        <span class="pay-method-check" id="payCheckWechat" style="visibility:hidden">✓</span>
      </div>
      <div class="pay-method" id="payMethodAlipay" onclick="selectPayMethod('alipay')">
        <span class="pay-method-icon">💙</span>
        <span class="pay-method-name">支付宝</span>
        <span class="pay-method-check" id="payCheckAlipay" style="visibility:hidden">✓</span>
      </div>
      <div class="pay-method" id="payMethodRoom" onclick="selectPayMethod('room')" style="display:none;">
        <span class="pay-method-icon">🏠</span>
        <span class="pay-method-name" id="payMethodRoomName">挂账到房间</span>
        <span class="pay-method-check" id="payCheckRoom" style="visibility:hidden">✓</span>
      </div>
    </div>
    <div class="pay-modal-btns">
      <button class="pay-btn-cancel" onclick="cancelPay()">取消</button>
      <button class="pay-btn-confirm" id="payConfirmBtn" onclick="confirmPay()">确认支付</button>
    </div>
  </div>
</div>

<script>
// ── data ──
// Sync with supply-chain.json: all 12 products with story/brewingTips
var products = {
  snack: [
    { id:'S01', name:'坚果拼盘', desc:'精选四种坚果 · 轻盐烘焙', price:38, spec:'200g/份', icon:'🌰', bg:'#fff3e0', image:'', story:'精选美国杏仁、新疆核桃、云南松子、东北榛子，轻盐烘焙原香酥脆。', origin:'混合产地' },
    { id:'S02', name:'绿豆糕（经典款）', desc:'传统苏式 · 细腻绵密', price:25, spec:'150g/盒', icon:'🥮', bg:'#fff8e1', image:'', story:'去皮绿豆蒸制，口感细腻绵密入口即化，甜而不腻。保质期较短建议即买即食。', origin:'江苏苏州' },
  ],
  tea: [
    { id:'T01', name:'明前龙井', desc:'西湖核心产区 · 清香甘醇', price:168, spec:'250g/罐', icon:'🍃', bg:'#e8f5e9', image:'', story:'明前采摘于西湖核心产区，芽叶细嫩色泽翠绿。建议85℃山泉水冲泡，玻璃杯上投法。', origin:'杭州西湖', brewingTips:'85℃水温 · 30-60秒出汤 · 玻璃杯' },
    { id:'T02', name:'金骏眉', desc:'武夷山桐木关 · 蜜香甘醇', price:258, spec:'200g/罐', icon:'🪵', bg:'#fce4ec', image:'', story:'全芽头制作金毫显露，蜜香与花果香交融汤色金黄透亮。可连泡十余次。', origin:'福建武夷山', brewingTips:'90℃水温 · 即刻出汤 · 白瓷盖碗' },
    { id:'T03', name:'铁观音', desc:'安溪高山 · 七泡有余香', price:138, spec:'250g/罐', icon:'🏔️', bg:'#fff3e0', image:'', story:'安溪高山生态茶园，传统半发酵工艺兰花香韵清雅回甘悠长。', origin:'福建安溪', brewingTips:'100℃沸水 · 15-30秒 · 盖碗/紫砂壶' },
    { id:'T04', name:'云南普洱（生普）', desc:'勐海古树 · 茶气霸烈', price:198, spec:'357g/饼', icon:'🌿', bg:'#efebe9', image:'', story:'古树茶园原料传统石磨压饼，茶气霸烈回甘迅猛。紫砂壶冲泡最佳。', origin:'云南勐海', brewingTips:'100℃沸水 · 5-10秒渐增 · 紫砂壶' },
    { id:'T05', name:'云南普洱（熟普）', desc:'勐海发酵 · 陈香醇厚', price:208, spec:'357g/饼', icon:'🏵️', bg:'#f1f8e9', image:'', story:'传统渥堆发酵工艺陈香醇厚，汤色红浓透亮。茶性温和老少皆宜。', origin:'云南勐海', brewingTips:'100℃沸水 · 10-20秒 · 保温杯可闷泡' },
    { id:'T06', name:'武夷岩茶', desc:'大红袍 · 岩骨花香', price:358, spec:'100g/罐', icon:'🪨', bg:'#efebe9', image:'', story:'大红袍岩骨花香，韵味悠长。建议用紫砂壶冲泡，前5泡即冲即出。', origin:'福建武夷山', brewingTips:'100℃沸水 · 5-10秒 · 紫砂壶' },
    { id:'T07', name:'福鼎白茶', desc:'白毫银针 · 清甜回甘', price:198, spec:'50g/罐', icon:'🌸', bg:'#f3e5f5', image:'', story:'白毫银针清甜回甘，越陈越香。可用盖碗冲泡或煮饮。', origin:'福建福鼎', brewingTips:'90℃水温 · 30-60秒 · 盖碗' },
    { id:'T08', name:'碧螺春', desc:'太湖东山 · 花果香韵', price:218, spec:'200g/罐', icon:'🌱', bg:'#e8f5e9', image:'', story:'一芽一叶精制白毫显露卷曲如螺，花果香馥郁滋味鲜爽回甘。', origin:'苏州太湖', brewingTips:'80℃水温 · 20-40秒 · 玻璃杯下投法' },
  ],
  ware: [
    { id:'W01', name:'建盏茶杯', desc:'建阳传统工艺 · 铁胎厚釉', price:58, spec:'单只装', icon:'🏺', bg:'#efebe9', image:'', story:'福建建阳传统工艺烧制，兔毫/油滴纹路自然天成。每只纹理独一无二。', origin:'福建建阳' },
    { id:'W02', name:'紫砂壶（小号）', desc:'宜兴原矿 · 手工拍打', price:188, spec:'200ml', icon:'🫖', bg:'#f5f5f5', image:'', story:'宜兴原矿紫泥手工拍打成型，小壶聚香适合冲泡高香型乌龙茶。', origin:'江苏宜兴', brewingTips:'一壶一茶专茶专用' },
    { id:'W03', name:'双人下午茶套餐', desc:'双人茶聚 · 经典之选', price:168, spec:'1份', icon:'🧁', bg:'#fce4ec', image:'', story:'任选2壶茶饮+双色绿豆糕+坚果拼盘+时令水果，适合与友人共度下午茶。', origin:'高岸茶室' },
    { id:'W04', name:'商务洽谈套餐', desc:'商务会谈 · 尊享体验', price:228, spec:'1份', icon:'💼', bg:'#e3f2fd', image:'', story:'精选岩茶或金骏眉+茶点四色拼盘+商务简餐，私密包间从容会面。', origin:'高岸茶室' },
  ],
};

// Room context
var orderRoomId = null;
var orderRoomName = null;
var orderTableId = null;
var roomBannerVisible = false;

(function() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('room_id')) {
    orderRoomId = params.get('room_id');
    orderRoomName = params.get('room_name') || '本包间';
    orderTableId = params.get('table_id') || '1';
    roomBannerVisible = true;
    var banner = document.getElementById('roomBanner');
    var text = document.getElementById('roomBannerText');
    text.textContent = '正在为 ' + orderRoomName + ' ' + orderTableId + '号桌 点单';
    banner.style.display = 'flex';
    // Show room charge payment option
    document.getElementById('payMethodRoom').style.display = 'flex';
    document.getElementById('payMethodRoomName').textContent = '🏠 挂账到' + orderRoomName;
  }
})();

function closeRoomBanner() {
  document.getElementById('roomBanner').style.display = 'none';
  roomBannerVisible = false;
}

var currentCat = 'tea';
var cart = JSON.parse(localStorage.getItem('mp_tea_cart') || '[]');
var detailProduct = null;
var detailQty = 1;
var payMethod = 'balance';

// Init category tabs dynamically
(function() {
  var tabs = [
    { key:'snack', label:'🍪 茶点' },
    { key:'tea', label:'🍃 茶叶' },
    { key:'ware', label:'🫖 茶具' },
  ];
  var html = '';
  for (var i = 0; i < tabs.length; i++) {
    html += '<button class="cat-tab' + (i === 1 ? ' active' : '') + '" onclick="switchCat(\'' + tabs[i].key + '\')">' + tabs[i].label + '</button>';
  }
  document.getElementById('catTabs').innerHTML = html;
})();

renderProducts();
renderCartBadge();

// Check if ?tab=cart
if (window.location.search.indexOf('tab=cart') >= 0) {
  showCart();
}

function switchCat(cat) {
  currentCat = cat;
  var tabs = document.querySelectorAll('.cat-tab');
  var keys = ['snack','tea','ware'];
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.toggle('active', keys[i] === cat);
  renderProducts();
}

function getCartQty(productId) {
  for (var i = 0; i < cart.length; i++) {
    if (cart[i].id === productId) return cart[i].qty;
  }
  return 0;
}

function addToCart(product) {
  var existing = null;
  for (var i = 0; i < cart.length; i++) {
    if (cart[i].id === product.id) { existing = cart[i]; break; }
  }
  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({ id:product.id, name:product.name, price:product.price, qty:1, icon:product.icon, spec:product.spec || '' });
  }
  saveCart();
  renderProducts();
  renderCartBadge();
}

function removeFromCart(product) {
  for (var i = 0; i < cart.length; i++) {
    if (cart[i].id === product.id) {
      cart[i].qty -= 1;
      if (cart[i].qty <= 0) cart.splice(i, 1);
      break;
    }
  }
  saveCart();
  renderProducts();
  renderCartBadge();
}

function saveCart() {
  localStorage.setItem('mp_tea_cart', JSON.stringify(cart));
}

function renderCartBadge() {
  var total = 0;
  for (var i = 0; i < cart.length; i++) total += cart[i].qty;
  var badge = document.getElementById('cartBadge');
  if (badge) {
    badge.textContent = total;
    badge.style.display = total > 0 ? '' : 'none';
  }
}

function renderProducts() {
  var list = products[currentCat];
  var html = '';
  for (var i = 0; i < list.length; i++) {
    var p = list[i];
    var qty = getCartQty(p.id);
    var catVar = 'products.' + currentCat;
    html += '<div class="product-card" onclick="showProductDetail(' + catVar + '[' + i + '])">' +
      (p.image
        ? '<img src="' + p.image + '" class="product-img" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'" /><div class="product-img-placeholder" style="display:none;background:' + p.bg + '">' + p.icon + '</div>'
        : '<div class="product-img-placeholder" style="background:' + p.bg + '">' + p.icon + '</div>') +
      '<div class="product-body">' +
        '<div class="product-name">' + p.name + '</div>' +
        (p.spec ? '<div class="product-spec">' + p.spec + '</div>' : '') +
        '<div class="product-desc">' + p.desc + '</div>' +
        '<div class="product-footer">' +
          '<span class="product-price">¥' + p.price + '<span class="unit">/件</span></span>' +
          (qty > 0
            ? '<div class="qty-ctrl"><button class="qty-btn" onclick="event.stopPropagation();removeFromCart(' + catVar + '[' + i + '])">−</button><span class="qty-num">' + qty + '</span><button class="qty-btn" onclick="event.stopPropagation();addToCart(' + catVar + '[' + i + '])">+</button></div>'
            : '<button style="padding:4px 14px;border-radius:16px;background:#07c160;color:#fff;border:none;font-size:12px;cursor:pointer;" onclick="event.stopPropagation();addToCart(' + catVar + '[' + i + '])">+ 加购</button>') +
        '</div>' +
      '</div>' +
    '</div>';
  }
  document.getElementById('productList').innerHTML = html;
}

function showCart() {
  document.getElementById('productView').style.display = 'none';
  document.getElementById('cartView').style.display = 'block';
  renderCart();
}

function showProducts() {
  document.getElementById('productView').style.display = 'block';
  document.getElementById('cartView').style.display = 'none';
}

function renderCart() {
  if (cart.length === 0) {
    document.getElementById('cartItems').innerHTML = '<div class="cart-empty">🛒<br>购物车是空的<br><span style="font-size:12px;">快去选些好茶吧</span></div>';
    document.getElementById('cartTotalPrice').textContent = '¥0';
    return;
  }
  var html = '';
  var total = 0;
  for (var i = 0; i < cart.length; i++) {
    var item = cart[i];
    var subtotal = item.price * item.qty;
    total += subtotal;
    html += '<div class="cart-item">' +
      '<span style="font-size:24px;margin-right:10px;">' + (item.icon || '🛒') + '</span>' +
      '<span class="cart-item-name">' + item.name + '</span>' +
      '<div class="qty-ctrl">' +
        '<button class="qty-btn" onclick="cartQtyDec(\'' + item.id + '\')">−</button>' +
        '<span class="qty-num">' + item.qty + '</span>' +
        '<button class="qty-btn" onclick="cartQtyInc(\'' + item.id + '\')">+</button>' +
      '</div>' +
      '<span class="cart-item-price">¥' + subtotal + '</span>' +
      '</div>';
  }
  document.getElementById('cartItems').innerHTML = html;
  document.getElementById('cartTotalPrice').textContent = '¥' + total;
}

function cartQtyInc(id) {
  for (var i = 0; i < cart.length; i++) {
    if (cart[i].id === id) { cart[i].qty += 1; break; }
  }
  saveCart();
  renderCart();
  renderCartBadge();
}

function cartQtyDec(id) {
  for (var i = 0; i < cart.length; i++) {
    if (cart[i].id === id) {
      cart[i].qty -= 1;
      if (cart[i].qty <= 0) cart.splice(i, 1);
      break;
    }
  }
  saveCart();
  renderCart();
  renderCartBadge();
  if (cart.length === 0) showProducts();
}

function clearCart() {
  cart = [];
  saveCart();
  renderCart();
  renderCartBadge();
  showProducts();
  showToast('购物车已清空');
}

function checkout() {
  if (cart.length === 0) { showToast('购物车为空'); return; }
  showPayModal();
}

function showPayModal() {
  var total = 0;
  var html = '';
  for (var i = 0; i < cart.length; i++) {
    var item = cart[i];
    var subtotal = item.price * item.qty;
    total += subtotal;
    html += '<div class="pay-item-row"><span>' + item.name + ' ×' + item.qty + '</span><span>¥' + subtotal + '</span></div>';
  }
  document.getElementById('payItems').innerHTML = html;
  document.getElementById('payTotal').textContent = '¥' + total;
  payMethod = 'balance';
  selectPayMethod('balance');
  document.getElementById('payModal').style.display = 'flex';
}

function selectPayMethod(method) {
  payMethod = method;
  var methods = ['balance','wechat','alipay','room'];
  methods.forEach(function(m) {
    var el = document.getElementById('payMethod' + m.charAt(0).toUpperCase() + m.slice(1));
    var check = document.getElementById('payCheck' + m.charAt(0).toUpperCase() + m.slice(1));
    if (el) el.classList.toggle('selected', m === method);
    if (check) check.style.visibility = m === method ? 'visible' : 'hidden';
  });
}

function confirmPay() {
  var total = 0;
  var items = [];
  for (var i = 0; i < cart.length; i++) {
    total += cart[i].price * cart[i].qty;
    items.push({ name: cart[i].name, qty: cart[i].qty, price: cart[i].price, icon: cart[i].icon });
  }

  // Check balance if paying with balance
  if (payMethod === 'balance') {
    var user = JSON.parse(localStorage.getItem('mp_user') || 'null');
    var balance = user ? (user.balance || 0) : 0;
    if (balance < total) {
      showToast('余额不足（余额¥' + balance + '），请选择其他支付方式');
      return;
    }
    user.balance -= total;
    localStorage.setItem('mp_user', JSON.stringify(user));
  }

  // Handle room charge
  if (payMethod === 'room') {
    // Save to room bills
    var roomBills = JSON.parse(localStorage.getItem('erp_room_bills') || '{}');
    if (!roomBills[orderRoomId]) {
      roomBills[orderRoomId] = { roomId:orderRoomId, roomName:orderRoomName, items:[], totalAmount:0, roomFee:0, createdAt:new Date().toISOString(), settledAt:null };
    }
    roomBills[orderRoomId].items = roomBills[orderRoomId].items.concat(items.map(function(item) {
      return { productName:item.name, qty:item.qty, price:item.price, amount:item.price * item.qty, orderedAt:new Date().toISOString() };
    }));
    roomBills[orderRoomId].totalAmount += total;
    localStorage.setItem('erp_room_bills', JSON.stringify(roomBills));

    // Create order record
    var shopOrders = JSON.parse(localStorage.getItem('mp_shop_orders') || '[]');
    var orderId = 'SH' + Date.now();
    var now = new Date();
    shopOrders.unshift({
      orderId: orderId,
      items: items,
      totalAmount: total,
      status: 'RoomCharge',
      createdAt: now.toISOString(),
      date: now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0'),
      time: String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0'),
      payment: '挂账到房间',
      roomId: orderRoomId,
      roomName: orderRoomName,
      tableId: orderTableId,
      type: 'room-charge'
    });
    localStorage.setItem('mp_shop_orders', JSON.stringify(shopOrders));

    cart = [];
    saveCart();
    renderCartBadge();
    showProducts();
    renderCart();
    document.getElementById('payModal').style.display = 'none';
    showToast('✅ 已挂账至' + orderRoomName + '，请在离店时统一结算');
    return;
  }

  // Determine if order needs shipping
  var needsShipping = false;
  for (var i = 0; i < cart.length; i++) {
    var cid = cart[i].id;
    if (cid && cid.charAt(0) === 'T') { needsShipping = true; break; }
  }
  var orderStatus = needsShipping ? 'Shipping' : 'Completed';

  var shopOrders = JSON.parse(localStorage.getItem('mp_shop_orders') || '[]');
  var orderId = 'SH' + Date.now();
  var now = new Date();
  var dateStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  var timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  shopOrders.unshift({
    orderId: orderId,
    items: items,
    totalAmount: total,
    status: orderStatus,
    createdAt: now.toISOString(),
    date: dateStr,
    time: timeStr,
    payment: payMethod === 'wechat' ? '微信支付' : payMethod === 'alipay' ? '支付宝' : '余额支付',
    type: 'shop'
  });
  localStorage.setItem('mp_shop_orders', JSON.stringify(shopOrders));

  cart = [];
  saveCart();
  renderCartBadge();
  showProducts();
  renderCart();
  document.getElementById('payModal').style.display = 'none';
  var statusMsg = needsShipping ? '待发货' : '已完成';
  showToast('支付成功！订单' + statusMsg + '，单号：' + orderId);
}

function cancelPay() {
  document.getElementById('payModal').style.display = 'none';
}

// ── Product Detail ──
function showProductDetail(product) {
  detailProduct = product;
  detailQty = 1;

  // Image
  var imgEl = document.getElementById('detailImg');
  var phEl = document.getElementById('detailPlaceholder');
  if (product.image) {
    imgEl.src = product.image;
    imgEl.style.display = 'block';
    phEl.style.display = 'none';
  } else {
    imgEl.style.display = 'none';
    phEl.style.display = 'flex';
    phEl.textContent = product.icon;
    phEl.style.background = product.bg || '#f5f5f5';
  }

  document.getElementById('detailName').textContent = product.name;
  document.getElementById('detailSpec').textContent = product.spec || '';
  document.getElementById('detailDesc').textContent = product.desc;
  document.getElementById('detailPrice').textContent = '¥' + product.price;
  document.getElementById('detailQty').textContent = '1';

  // Story section
  var storySection = document.getElementById('storySection');
  if (product.story) {
    storySection.style.display = 'block';
    document.getElementById('storyText').textContent = product.story;
    document.getElementById('storyOrigin').textContent = '📍 ' + (product.origin || '');
    var tips = product.brewingTips || '';
    var tipsHtml = '';
    if (tips) {
      var parts = tips.split('·');
      for (var ti = 0; ti < parts.length; ti++) {
        tipsHtml += '<span class="tip-tag">' + parts[ti].trim() + '</span>';
      }
    }
    document.getElementById('tipsRow').innerHTML = tipsHtml;
  } else {
    storySection.style.display = 'none';
  }

  document.getElementById('detailModal').style.display = 'flex';
}

function hideDetail() {
  document.getElementById('detailModal').style.display = 'none';
  detailProduct = null;
}

function detailQtyInc() {
  detailQty++;
  document.getElementById('detailQty').textContent = detailQty;
}

function detailQtyDec() {
  if (detailQty > 1) { detailQty--; document.getElementById('detailQty').textContent = detailQty; }
}

function detailAddToCart() {
  if (!detailProduct) return;
  var existing = null;
  for (var i = 0; i < cart.length; i++) {
    if (cart[i].id === detailProduct.id) { existing = cart[i]; break; }
  }
  if (existing) {
    existing.qty += detailQty;
  } else {
    cart.push({ id: detailProduct.id, name: detailProduct.name, price: detailProduct.price, qty: detailQty, icon: detailProduct.icon, spec: detailProduct.spec || '' });
  }
  saveCart();
  renderProducts();
  renderCartBadge();
  hideDetail();
  showToast(detailProduct.name + ' ×' + detailQty + ' 已加入购物车');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 2000);
}
</script>
