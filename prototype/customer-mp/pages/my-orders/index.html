<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的订单 - 高岸茶室</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f5f5f5; display:flex; justify-content:center; padding:20px; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
.phone { width:375px; height:812px; background:#f5f7fa; border-radius:20px; overflow:hidden; box-shadow:0 4px 24px rgba(0,0,0,.12); display:flex; flex-direction:column; position:relative; }
.nav-top { position:absolute; top:10px; right:10px; z-index:200; }
.nav-top a { font-size:12px; color:#666; text-decoration:none; background:rgba(255,255,255,.95); padding:6px 14px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.12); }
.page { flex:1; height:0; overflow-y:auto; padding-bottom:80px; }

/* Tabs */
.tab-bar { display:flex; background:#fff; border-bottom:1px solid #eee; position:sticky; top:0; z-index:10; }
.tab { flex:1; text-align:center; padding:14px 0; cursor:pointer; font-size:14px; color:#999; position:relative; transition:color .15s; }
.tab.active { color:#07c160; font-weight:600; }
.tab.active::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:24px; height:3px; background:#07c160; border-radius:2px; }

.order-card { background:#fff; border-radius:14px; padding:16px; margin:0 16px 12px; }
.order-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.order-room { font-size:16px; font-weight:600; }
.order-status { font-size:12px; font-weight:600; padding:4px 10px; border-radius:12px; }
.status-inuse { background:#e8f5e9; color:#00a870; }
.status-booked { background:#f3e5f5; color:#9c27b0; }
.status-completed { background:#f5f5f5; color:#999; }
.order-time { font-size:13px; color:#666; margin-bottom:4px; }
.order-price { font-size:14px; font-weight:600; color:#e37318; margin-bottom:8px; }
.door-section { background:#fffbf0; border-radius:10px; padding:12px; margin:10px 0; display:flex; align-items:center; justify-content:space-between; }
.door-label { font-size:12px; color:#999; }
.door-code { font-size:20px; font-weight:800; font-family:"Courier New",monospace; color:#333; letter-spacing:6px; }
.door-hint { font-size:12px; color:#e37318; }
.order-actions { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; align-items:center; }
.order-btn { padding:8px 16px; border-radius:8px; font-size:13px; cursor:pointer; border:none; font-weight:500; transition:opacity .15s; }
.order-btn:active { opacity:.8; }
.order-btn.primary { background:#07c160; color:#fff; }
.order-btn.outline { background:#fff; color:#07c160; border:1.5px solid #07c160; }
.order-btn.danger { background:#fff; color:#d54941; border:1.5px solid #d54941; }
.order-btn.ghost { background:#f5f5f5; color:#666; }
.empty { text-align:center; padding:60px 20px; color:#999; }
.empty-icon { font-size:48px; margin-bottom:12px; }
.cancel-note { font-size:11px; color:#999; margin-left:8px; }

/* Bottom nav */
.bottom-nav { display:flex; border-top:1px solid #eee; background:#fff; flex-shrink:0; }
.nav-item { flex:1; text-align:center; padding:10px 0 6px; cursor:pointer; color:#999; }
.nav-item.active { color:#07c160; }
.nav-item .nav-icon { font-size:20px; }
.nav-item .nav-label { font-size:10px; margin-top:2px; }

.toast { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:100;display:none; }
.modal-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:99;display:none;align-items:center;justify-content:center; }
.modal { background:#fff;border-radius:14px;padding:20px;width:300px;text-align:center; }
.modal h3 { font-size:16px;margin-bottom:8px;color:#333; }
.modal p { font-size:13px;color:#666;margin-bottom:16px; }
.modal-buttons { display:flex;gap:10px; }
.modal-btn { flex:1;padding:10px;border-radius:8px;font-size:14px;cursor:pointer;border:none;font-weight:600; }
.modal-btn.cancel { background:#f5f5f5;color:#666; }
.modal-btn.confirm { background:#07c160;color:#fff; }
.modal-btn.danger { background:#d54941;color:#fff; }

/* Extend time picker */
.time-picker { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:12px; }
.time-option { padding:10px 8px; border-radius:8px; border:1.5px solid #e5e5e5; background:#fff; cursor:pointer; font-size:12px; text-align:center; transition:all .15s; }
.time-option:hover { border-color:#07c160; }
.time-option.selected { background:#07c160; color:#fff; border-color:#07c160; }
.time-option .ext-time { font-weight:600; display:block; }
.time-option .ext-price { font-size:10px; display:block; margin-top:2px; }
</style>
</head>
<body>
<div class="nav-top"><a href="../../../index.html">返回导航</a></div>
<div class="phone">
  <div class="tab-bar">
    <div class="tab active" onclick="switchOrderTab('active',this)">进行中</div>
    <div class="tab" onclick="switchOrderTab('upcoming',this)">待使用</div>
    <div class="tab" onclick="switchOrderTab('completed',this)">已完成</div>
  </div>
  <div class="page" id="orderList"></div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="location.href='../home/index.html'"><div class="nav-icon">🏠</div><div class="nav-label">主页</div></div>
    <div class="nav-item" onclick="location.href='../room-detail/index.html'"><div class="nav-icon">📅</div><div class="nav-label">预订</div></div>
    <div class="nav-item" onclick="location.href='../tea-shop/index.html'"><div class="nav-icon">🍵</div><div class="nav-label">茶品</div></div>
    <div class="nav-item active"><div class="nav-icon">📋</div><div class="nav-label">订单</div></div>
    <div class="nav-item" onclick="location.href='../member-center/index.html'"><div class="nav-icon">👤</div><div class="nav-label">我的</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="cancelModal">
  <div class="modal">
    <h3>取消预约</h3>
    <p id="cancelMsg"></p>
    <div class="modal-buttons"><button class="modal-btn cancel" onclick="hideModal()">再想想</button><button class="modal-btn danger" onclick="confirmCancel()">确认取消</button></div>
  </div>
</div>
<div class="modal-overlay" id="extendModal">
  <div class="modal">
    <h3>续订包间</h3>
    <p id="extendInfo">请选择续订至何时：</p>
    <div class="time-picker" id="extendOptions"></div>
    <div class="modal-buttons"><button class="modal-btn cancel" onclick="hideExtendModal()">取消</button><button class="modal-btn confirm" id="extendConfirmBtn" disabled onclick="doExtendOrder()">确认续订</button></div>
  </div>
</div>
<div class="modal-overlay" id="detailModal">
  <div class="modal" id="detailContent"></div>
</div>
<script>
let currentOrderTab = 'active';
let cancelTarget = null;
let extendTarget = null;
let selectedExtendIdx = null;

// Load bookings from localStorage, merge with demo orders
var savedBookings = [];
try { savedBookings = JSON.parse(localStorage.getItem('mp_bookings') || '[]'); } catch(e) {}
var orders = savedBookings.concat([
  { id:"ORD001", roomId:"RM004", roomName:"大茶室C", date:"2026-05-08", time:"10:00-11:30", price:180, status:"InUse", doorCode:"8264", doorValid:true, remaining:45, endTime:"11:30", duration:"90" },
  { id:"ORD003", roomId:"RM004", roomName:"大茶室C", date:"2026-05-08", time:"16:00-18:00", price:240, status:"Booked", doorCode:null, doorValid:false, endTime:"18:00" },
  { id:"ORD006", roomId:"RM003", roomName:"中茶室B", date:"2026-05-09", time:"10:00-12:00", price:240, status:"Booked", doorCode:null, doorValid:false, endTime:"12:00" },
  { id:"ORD004", roomId:"RM002", roomName:"中茶室A", date:"2026-05-07", time:"10:00-12:00", price:160, status:"Completed", payment:"微信支付" },
  { id:"ORD005", roomId:"RM001", roomName:"大会议室", date:"2026-05-07", time:"14:00-18:00", price:800, status:"Completed", payment:"余额支付" },
  { id:"ORD007", roomId:"RM004", roomName:"大茶室C", date:"2026-05-06", time:"14:00-17:00", price:360, status:"Completed", payment:"微信支付" },
]);

function switchOrderTab(tab, el) {
  currentOrderTab = tab;
  const parent = el.parentElement;
  parent.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); t.style.color='#999'; t.style.fontWeight='normal'; });
  el.classList.add('active'); el.style.color='#07c160'; el.style.fontWeight='600';
  renderOrders();
}

function renderOrders() {
  const container = document.getElementById('orderList');
  const shopOrders = JSON.parse(localStorage.getItem('mp_shop_orders') || '[]');
  const mappedShopOrders = shopOrders.map(function(s) {
    return {
      id: s.orderId,
      orderId: s.orderId,
      roomName: '茶品商城',
      date: s.date || '',
      time: s.time || '',
      price: s.totalAmount,
      status: s.status,
      isShop: true,
      items: s.items,
      payment: s.payment || '微信支付',
      createdAt: s.createdAt
    };
  });
  const allOrders = orders.concat(mappedShopOrders);

  var filtered;
  if (currentOrderTab === 'active') filtered = allOrders.filter(function(o) { return o.status === 'InUse' || o.status === 'Shipping'; });
  else if (currentOrderTab === 'upcoming') filtered = allOrders.filter(function(o) { return o.status === 'Booked'; });
  else filtered = allOrders.filter(function(o) { return o.status === 'Completed' || o.status === 'ShopCompleted'; });

  if (!filtered.length) {
    container.innerHTML = '<div style="padding:16px;"><div class="empty"><div class="empty-icon">📭</div><p>暂无订单</p></div></div>';
    return;
  }

  container.innerHTML = '<div style="padding:16px;">' + filtered.map(function(o) {
    var encName = encodeURIComponent(o.roomName || '');
    var durationVal = o.duration || '90';
    var statusHtml = '', contentHtml = '';

    if (o.status === 'InUse') {
      statusHtml = '<span class="order-status status-inuse">使用中</span>';
      contentHtml = '<div class="door-section">' +
        '<div><div class="door-label">门禁密码</div><div class="door-code">' + o.doorCode + '</div></div>' +
        '<button class="order-btn ghost" onclick="copyCode(\'' + o.doorCode + '\')">📋</button>' +
        '</div>' +
        '<div class="order-actions">' +
        '<button class="order-btn primary" onclick="location.href=\'../room-control/index.html?roomId=' + o.roomId + '&roomName=' + encName + '&duration=' + durationVal + '\'">房内智控</button>' +
        '<button class="order-btn outline" onclick="showExtendOrder(\'' + o.id + '\')">续订</button>' +
        '<button class="order-btn danger" onclick="quickCheckout(\'' + o.id + '\')">退房</button>' +
        '</div>';
    } else if (o.status === 'Booked') {
      statusHtml = '<span class="order-status status-booked">已预定</span>';
      var isClose = o.date === '2026-05-08';
      contentHtml = '<div class="door-section"><div class="door-label">门禁密码</div><div class="door-hint">预约前30分钟显示</div></div>' +
        '<div class="order-actions">' +
        '<button class="order-btn danger" onclick="showCancel(\'' + o.id + '\',' + (!isClose) + ')">取消预约</button>' +
        '<span class="cancel-note">' + (isClose ? '距开始不足2小时，取消收取定金50%' : '距开始超过2小时，可免费取消') + '</span>' +
        '</div>';
    } else if (o.isShop && o.status === 'Shipping') {
      statusHtml = '<span class="order-status status-booked" style="background:#fff3e0;color:#e37318;">待发货</span>';
      var shipItemsHtml = '';
      if (o.items && o.items.length) {
        for (var si = 0; si < o.items.length; si++) {
          var shipItem = o.items[si];
          if (si > 0) shipItemsHtml += ' · ';
          shipItemsHtml += shipItem.name + ' ×' + shipItem.qty + ' ¥' + (shipItem.price * shipItem.qty);
        }
      }
      contentHtml = '<div style="font-size:13px;color:#666;margin-bottom:8px;">' + shipItemsHtml + '</div>' +
        '<div style="font-size:12px;color:#999;margin-bottom:8px;">预计3-5个工作日发货 · ' + (o.payment || '微信支付') + '</div>' +
        '<div class="order-actions">' +
        '<button class="order-btn outline" onclick="showShopDetail(\'' + o.id + '\')">查看详情</button>' +
        '</div>';
    } else if (o.isShop) {
      statusHtml = '<span class="order-status status-inuse" style="background:#e3f2fd;color:#0052d9;">商品消费</span>';
      var shopItemsHtml = '';
      if (typeof o.items === 'string') {
        shopItemsHtml = o.items;
      } else if (o.items && o.items.length) {
        for (var si2 = 0; si2 < o.items.length; si2++) {
          var sitem = o.items[si2];
          if (si2 > 0) shopItemsHtml += ' · ';
          shopItemsHtml += sitem.name + ' ×' + sitem.qty + ' ¥' + (sitem.price * sitem.qty);
        }
      }
      contentHtml = '<div style="font-size:13px;color:#666;margin-bottom:8px;">' + shopItemsHtml + '</div>' +
        '<div style="font-size:12px;color:#999;margin-bottom:8px;">支付方式: ' + (o.payment || '微信支付') + '</div>' +
        '<div class="order-actions">' +
        '<button class="order-btn outline" onclick="showShopDetail(\'' + o.id + '\')">查看详情</button>' +
        '</div>';
    } else {
      statusHtml = '<span class="order-status status-completed">已完成</span>';
      contentHtml = '<div style="font-size:13px;color:#666;margin-bottom:8px;">支付方式: ' + o.payment + '</div>' +
        '<div class="order-actions">' +
        '<button class="order-btn outline" onclick="location.href=\'../room-detail/index.html?id=' + o.roomId + '\'">再次预约</button>' +
        '<button class="order-btn ghost" onclick="showDetail(\'' + o.id + '\')">查看详情</button>' +
        '</div>';
    }

    return '<div class="order-card">' +
      '<div class="order-header"><span class="order-room">' + o.roomName + '</span>' + statusHtml + '</div>' +
      '<div class="order-time">' + o.date + ' ' + o.time + '</div>' +
      '<div class="order-price">¥' + o.price + '</div>' +
      contentHtml +
      '</div>';
  }).join('') + '</div>';
}

// Cancel
function showCancel(id, free) {
  cancelTarget = id;
  document.getElementById('cancelMsg').textContent = free ? '距开始时间超过2小时，免费取消' : '距开始不足2小时，将收取定金的50%作为违约金';
  document.getElementById('cancelModal').style.display = 'flex';
}
function confirmCancel() {
  if (cancelTarget) {
    for (var i = 0; i < orders.length; i++) {
      if (orders[i].id === cancelTarget) { orders[i].status = 'Cancelled'; break; }
    }
    showToast('订单已取消，退款将退回原支付方式');
  }
  hideModal(); cancelTarget = null; renderOrders();
}
function quickCheckout(id) {
  for (var i = 0; i < orders.length; i++) {
    if (orders[i].id === id) { orders[i].status = 'Completed'; break; }
  }
  showToast('退房成功！'); renderOrders();
}

// Extend from orders page
function showExtendOrder(id) {
  extendTarget = id;
  var o = null;
  for (var i = 0; i < orders.length; i++) { if (orders[i].id === id) { o = orders[i]; break; } }
  if (!o) return;
  var et = o.endTime || (o.time ? o.time.split('-')[1] : '12:00');
  var parts = et.split(':');
  var endH = parseInt(parts[0]), endM = parseInt(parts[1]) || 0;
  var baseMin = Math.ceil((endH * 60 + endM) / 30) * 30;
  document.getElementById('extendInfo').innerHTML =
    '<div>订单日期: <b>' + o.date + '</b> · 原时段: <b>' + o.time + '</b></div>' +
    '<div style="margin-top:4px;">当前将于 <b>' + et + '</b> 结束。请选择续订至何时：</div>';

  var optsHtml = '';
  for (var i = 1; i <= 8; i++) {
    var totalMin = baseMin + i * 30;
    var h = Math.floor(totalMin / 60) % 24;
    var m = totalMin % 60;
    var extMin = i * 30;
    var price = Math.round(120 * extMin / 60);
    optsHtml += '<div class="time-option" id="extOpt' + i + '" onclick="selectExtOpt(' + i + ')">' +
      '<span class="ext-time">至 ' + String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + '</span>' +
      '<span class="ext-price">+' + extMin + '分钟 ¥' + price + '</span></div>';
  }
  document.getElementById('extendOptions').innerHTML = optsHtml;
  selectedExtendIdx = null;
  document.getElementById('extendConfirmBtn').disabled = true;
  document.getElementById('extendModal').style.display = 'flex';
}
function selectExtOpt(i) {
  document.querySelectorAll('#extendOptions .time-option').forEach(function(o) { o.classList.remove('selected'); });
  document.getElementById('extOpt'+i).classList.add('selected');
  selectedExtendIdx = i;
  document.getElementById('extendConfirmBtn').disabled = false;
}
function doExtendOrder() {
  if (selectedExtendIdx === null || !extendTarget) return;
  var o = null;
  for (var i = 0; i < orders.length; i++) { if (orders[i].id === extendTarget) { o = orders[i]; break; } }
  if (!o) return;
  var extMin = selectedExtendIdx * 30;
  var price = Math.round(120 * extMin / 60);

  var balance = parseInt(localStorage.getItem('mp_balance') || '280');
  balance -= price;
  localStorage.setItem('mp_balance', String(balance));

  o.price += price;
  var et = o.endTime || (o.time ? o.time.split('-')[1] : '12:00');
  var parts = et.split(':');
  var endH = parseInt(parts[0]), endM = parseInt(parts[1]) || 0;
  var newMin = Math.ceil((endH * 60 + endM) / 30) * 30 + extMin;
  o.endTime = String(Math.floor(newMin/60)%24).padStart(2,'0') + ':' + String(newMin%60).padStart(2,'0');
  o.time = o.time.split('-')[0] + '-' + o.endTime;
  hideExtendModal();
  showToast('续订成功！已续订至 ' + o.endTime + '，¥' + price + ' 已从余额扣除，订单总价 ¥' + o.price + '，余额 ¥' + balance);
  renderOrders();
}
function hideExtendModal() { document.getElementById('extendModal').style.display = 'none'; extendTarget = null; }

// Detail for room orders
function showDetail(id) {
  var o = null;
  for (var i = 0; i < orders.length; i++) { if (orders[i].id === id) { o = orders[i]; break; } }
  if (!o) { showShopDetail(id); return; }
  document.getElementById('detailContent').innerHTML =
    '<h3>订单详情</h3>' +
    '<div style="text-align:left;font-size:13px;color:#666;">' +
    '<div style="display:flex;justify-content:space-between;padding:6px 0;"><span>包间</span><span>' + o.roomName + '</span></div>' +
    '<div style="display:flex;justify-content:space-between;padding:6px 0;"><span>日期</span><span>' + o.date + '</span></div>' +
    '<div style="display:flex;justify-content:space-between;padding:6px 0;"><span>时间</span><span>' + o.time + '</span></div>' +
    '<div style="display:flex;justify-content:space-between;padding:6px 0;"><span>金额</span><span style="font-weight:700;color:#e37318;">¥' + o.price + '</span></div>' +
    '<div style="display:flex;justify-content:space-between;padding:6px 0;"><span>支付方式</span><span>' + (o.payment||'—') + '</span></div>' +
    '</div>' +
    '<button class="modal-btn cancel" style="margin-top:12px;width:100%;" onclick="document.getElementById(\'detailModal\').style.display=\'none\'">关闭</button>';
  document.getElementById('detailModal').style.display = 'flex';
}

// Detail for shop orders
function showShopDetail(id) {
  var shopOrders = JSON.parse(localStorage.getItem('mp_shop_orders') || '[]');
  var o = null;
  for (var i = 0; i < shopOrders.length; i++) {
    if (shopOrders[i].orderId === id || shopOrders[i].id === id) { o = shopOrders[i]; break; }
  }
  if (!o) { showToast('订单信息未找到'); return; }

  var statusLabel = o.status === 'Shipping' ? '待发货' : o.status === 'Completed' ? '已完成' : '商品消费';
  var itemsHtml = '';
  if (typeof o.items === 'string') {
    itemsHtml = o.items;
  } else if (o.items && o.items.length) {
    for (var k = 0; k < o.items.length; k++) {
      var item = o.items[k];
      itemsHtml += '<div style="display:flex;justify-content:space-between;padding:4px 0;">' +
        '<span>' + item.name + ' ×' + item.qty + '</span>' +
        '<span>¥' + (item.price * item.qty) + '</span></div>';
    }
  }
  var extraInfo = '';
  if (o.status === 'Shipping') {
    extraInfo = '<div style="display:flex;justify-content:space-between;padding:6px 0;color:#e37318;"><span>发货状态</span><span>待发货 · 预计3-5个工作日</span></div>';
  }

  document.getElementById('detailContent').innerHTML =
    '<h3>商品订单详情</h3>' +
    '<div style="text-align:left;font-size:13px;color:#666;">' +
    '<div style="display:flex;justify-content:space-between;padding:6px 0;"><span>订单号</span><span>' + (o.orderId || o.id) + '</span></div>' +
    '<div style="display:flex;justify-content:space-between;padding:6px 0;"><span>日期</span><span>' + (o.date || '') + ' ' + (o.time || '') + '</span></div>' +
    '<div style="display:flex;justify-content:space-between;padding:6px 0;"><span>状态</span><span style="font-weight:600;">' + statusLabel + '</span></div>' +
    '<div style="margin-top:8px;border-top:1px solid #eee;padding-top:8px;">' + itemsHtml + '</div>' +
    extraInfo +
    '<div style="display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid #eee;margin-top:8px;"><span>合计</span><span style="font-weight:700;color:#e37318;">¥' + (o.totalAmount || o.price) + '</span></div>' +
    '<div style="display:flex;justify-content:space-between;padding:6px 0;"><span>支付方式</span><span>' + (o.payment || '—') + '</span></div>' +
    '</div>' +
    '<button class="modal-btn cancel" style="margin-top:12px;width:100%;" onclick="document.getElementById(\'detailModal\').style.display=\'none\'">关闭</button>';
  document.getElementById('detailModal').style.display = 'flex';
}

function copyCode(code) {
  navigator.clipboard && navigator.clipboard.writeText(code).then(function() { showToast('密码已复制: '+code); }).catch(function() { showToast('密码: '+code); });
}

function hideModal() { document.getElementById('cancelModal').style.display = 'none'; }
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 2000);
}

renderOrders();
</script>
</body>
</html>
