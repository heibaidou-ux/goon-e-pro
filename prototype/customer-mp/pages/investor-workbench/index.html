<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投资人看板</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f5f5f5; display:flex; justify-content:center; padding:20px; }
.phone { width:375px; height:812px; background:#f8f9fc; border-radius:20px; overflow:hidden; box-shadow:0 4px 24px rgba(0,0,0,.12); display:flex; flex-direction:column; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
.page { flex:1; min-height:0; overflow-y:auto; }
.nav-top { position:fixed; top:10px; right:20px; z-index:200; }
.nav-top a { font-size:12px; color:#666; text-decoration:none; background:rgba(255,255,255,.95); padding:6px 14px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.12); }
.header-bar { background:linear-gradient(135deg,#4a148c,#7b1fa2); padding:20px 16px 16px; color:#fff; }
.header-bar .greeting { font-size:14px; opacity:.8; }
.header-bar .title { font-size:22px; font-weight:700; margin-top:4px; }
.portfolio-card { background:linear-gradient(135deg,#7b1fa2,#9c27b0); color:#fff; border-radius:14px; padding:20px; margin:16px; box-shadow:0 4px 16px rgba(123,31,162,.3); }
.portfolio-card .pf-label { font-size:12px; opacity:.8; }
.portfolio-card .pf-amount { font-size:34px; font-weight:800; margin-top:4px; }
.portfolio-card .pf-row { display:flex; gap:16px; margin-top:12px; }
.portfolio-card .pf-item { flex:1; }
.portfolio-card .pf-item .pfi-label { font-size:11px; opacity:.7; }
.portfolio-card .pf-item .pfi-val { font-size:15px; font-weight:600; margin-top:2px; }
.stats-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 16px 16px; }
.stat-card { background:#fff; border-radius:12px; padding:14px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
.stat-card .stat-label { font-size:12px; color:#999; }
.stat-card .stat-value { font-size:20px; font-weight:700; margin-top:4px; }
.stat-card .stat-sub { font-size:11px; color:#aaa; margin-top:2px; }
.stat-card.green .stat-value { color:#07c160; }
.stat-card.orange .stat-value { color:#e37318; }
.stat-card.purple .stat-value { color:#7b1fa2; }
.section { padding:0 16px; margin-bottom:16px; }
.section-title { font-size:15px; font-weight:600; color:#1a1a1a; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
.section-more { font-size:12px; color:#0052d9; cursor:pointer; }
.store-card { background:#fff; border-radius:12px; padding:14px; margin-bottom:8px; box-shadow:0 1px 4px rgba(0,0,0,.04); }
.store-card .sc-header { display:flex; justify-content:space-between; align-items:center; }
.store-card .sc-name { font-size:14px; font-weight:600; }
.store-card .sc-roi { font-size:13px; font-weight:600; }
.store-card .sc-roi.positive { color:#07c160; }
.store-card .sc-roi.negative { color:#d54941; }
.store-card .sc-metrics { display:flex; gap:12px; margin-top:8px; }
.store-card .sc-metrics .scm { flex:1; text-align:center; }
.store-card .sc-metrics .scm .scm-val { font-size:14px; font-weight:600; }
.store-card .sc-metrics .scm .scm-label { font-size:10px; color:#999; margin-top:2px; }
.store-card .sc-bar { height:4px; background:#f0f0f0; border-radius:4px; margin-top:10px; overflow:hidden; }
.store-card .sc-bar .sc-fill { height:100%; border-radius:4px; }
.dividend-item { display:flex; align-items:center; padding:12px; background:#fff; border-radius:10px; margin-bottom:6px; box-shadow:0 1px 4px rgba(0,0,0,.04); }
.dividend-item .di-icon { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.dividend-item .di-body { flex:1; margin:0 10px; }
.dividend-item .di-body .di-name { font-size:13px; font-weight:500; }
.dividend-item .di-body .di-meta { font-size:11px; color:#999; margin-top:2px; }
.dividend-item .di-amount { font-size:15px; font-weight:700; color:#7b1fa2; }
.bottom-nav { display:flex; border-top:1px solid #eee; background:#fff; flex-shrink:0; }
.nav-item { flex:1; text-align:center; padding:10px 0 6px; cursor:pointer; text-decoration:none; color:#999; }
.nav-item .nav-icon { font-size:20px; }
.nav-item .nav-label { font-size:10px; margin-top:2px; }
.nav-item.active { color:#07c160; }
/* ── 我的页面 ── */
.my-view { display:none; padding:16px; }
.my-view .my-header { text-align:center; padding:20px 0; }
.my-view .my-avatar { width:72px; height:72px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 12px; font-size:32px; }
.my-view .my-name { font-size:18px; font-weight:700; color:#1a1a1a; }
.my-view .my-role { font-size:13px; color:#999; margin-top:4px; }
.my-view .my-info { background:#fff; border-radius:12px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,.06); margin-bottom:12px; }
.my-view .my-info-item { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f5f5f5; font-size:14px; }
.my-view .my-info-item:last-child { border-bottom:none; }
.my-view .my-info-label { color:#999; }
.my-view .my-info-value { color:#1a1a1a; font-weight:500; }
.my-view .my-settings { background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,.06); margin-bottom:12px; overflow:hidden; }
.my-view .my-settings-item { display:flex; align-items:center; padding:14px 16px; border-bottom:1px solid #f5f5f5; cursor:pointer; }
.my-view .my-settings-item:last-child { border-bottom:none; }
.my-view .my-settings-item .ms-icon { font-size:18px; margin-right:12px; }
.my-view .my-settings-item .ms-label { flex:1; font-size:14px; color:#1a1a1a; }
.my-view .my-settings-item .ms-arrow { font-size:12px; color:#ccc; }
.my-view .my-back-btn { display:block; width:100%; padding:12px; border:none; background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,.06); font-size:14px; color:#0052d9; cursor:pointer; text-align:center; margin-bottom:12px; }
.my-view .my-logout-btn { display:block; width:100%; padding:12px; border:none; background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,.06); font-size:14px; color:#d54941; cursor:pointer; text-align:center; }
</style>
</head>
<body>
<div class="nav-top"><a href="../../../index.html">← 返回</a></div>
<div class="phone">
  <div class="page">
    <div class="header-bar">
      <div class="greeting">👋 尊敬的投资者</div>
      <div class="title">投资人看板</div>
    </div>

    <div class="portfolio-card">
      <div class="pf-label">投资组合总估值</div>
      <div class="pf-amount">¥486.2万</div>
      <div class="pf-row">
        <div class="pf-item"><div class="pfi-label">总投资额</div><div class="pfi-val">¥350万</div></div>
        <div class="pf-item"><div class="pfi-label">累计分红</div><div class="pfi-val">¥86.4万</div></div>
        <div class="pf-item"><div class="pfi-label">整体ROI</div><div class="pfi-val" style="color:#b9f6ca">+24.7%</div></div>
      </div>
    </div>

    <div class="stats-row" id="statsRow"></div>

    <div class="section">
      <div class="section-title">
        <span>🏪 投资门店表现</span>
      </div>
      <div id="storeList"></div>
    </div>

    <div class="section">
      <div class="section-title">
        <span>💰 分红记录</span>
        <span class="section-more" onclick="showToast('查看全部分红历史')">更多 →</span>
      </div>
      <div id="dividendList"></div>
    </div>
  </div>

  <!-- ── 我的页面 ── -->
  <div class="my-view" id="myView">
    <div class="my-header">
      <div class="my-avatar" style="background:linear-gradient(135deg,#4a148c,#7b1fa2);color:#fff;">👤</div>
      <div class="my-name">投资人</div>
      <div class="my-role">天使投资人</div>
    </div>
    <div class="my-info">
      <div class="my-info-item"><span class="my-info-label">投资编号</span><span class="my-info-value">INV-001</span></div>
      <div class="my-info-item"><span class="my-info-label">总投资额</span><span class="my-info-value">¥350万</span></div>
      <div class="my-info-item"><span class="my-info-label">角色</span><span class="my-info-value">天使投资人</span></div>
    </div>
    <div class="my-settings">
      <div class="my-settings-item" onclick="showToast('查看报告设置（开发中）')">
        <span class="ms-icon">📊</span><span class="ms-label">查看报告设置</span><span class="ms-arrow">›</span>
      </div>
      <div class="my-settings-item" onclick="showToast('分红偏好设置（开发中）')">
        <span class="ms-icon">💰</span><span class="ms-label">分红偏好</span><span class="ms-arrow">›</span>
      </div>
    </div>
    <button class="my-back-btn" onclick="toggleMyView()">返回看板</button>
    <button class="my-logout-btn" onclick="logout()">退出登录</button>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active"><div class="nav-icon">📊</div><div class="nav-label">看板</div></div>
    <div class="nav-item" onclick="showToast('分红明细')"><div class="nav-icon">💰</div><div class="nav-label">分红</div></div>
    <div class="nav-item" onclick="toggleMyView()"><div class="nav-icon">👤</div><div class="nav-label">我的</div></div>
  </div>
</div>

<script>
const stores = [
  { name:'盈隆店', roi:'+28.3%', roiClass:'positive', revenue:182400, profit:58400, occupancy:'82%', barColor:'#07c160', barPct:82 },
  { name:'盈丰店', roi:'+18.6%', roiClass:'positive', revenue:124600, profit:35200, occupancy:'68%', barColor:'#7b1fa2', barPct:68 },
  { name:'金德店', roi:'+5.2%', roiClass:'positive', revenue:86200, profit:12600, occupancy:'45%', barColor:'#e37318', barPct:45 },
];

const dividends = [
  { period:'2026年Q1', store:'盈隆店', amount:'¥28,400', date:'2026-04-15', icon:'🏪' },
  { period:'2026年Q1', store:'盈丰店', amount:'¥16,200', date:'2026-04-15', icon:'🏪' },
  { period:'2025年Q4', store:'盈隆店', amount:'¥32,600', date:'2026-01-20', icon:'🏪' },
  { period:'2025年Q4', store:'盈丰店', amount:'¥14,800', date:'2026-01-20', icon:'🏪' },
];

document.getElementById('statsRow').innerHTML = [
  { label:'总收益', value:'¥136.2万', sub:'累计分红+增值', cls:'purple' },
  { label:'年化回报', value:'24.7%', sub:'较去年+3.2%', cls:'green' },
  { label:'投资门店', value:'3家', sub:'盈隆·盈丰·金德', cls:'blue' },
  { label:'待分红', value:'¥6.8万', sub:'Q2预估', cls:'orange' },
].map(function(s) {
  return '<div class="stat-card ' + s.cls + '"><div class="stat-label">' + s.label + '</div><div class="stat-value">' + s.value + '</div><div class="stat-sub">' + s.sub + '</div></div>';
}).join('');

document.getElementById('storeList').innerHTML = stores.map(function(s) {
  return '<div class="store-card">' +
    '<div class="sc-header"><span class="sc-name">📍 ' + s.name + '</span><span class="sc-roi ' + s.roiClass + '">' + s.roi + '</span></div>' +
    '<div class="sc-metrics">' +
      '<div class="scm"><div class="scm-val">¥' + (s.revenue/10000).toFixed(1) + '万</div><div class="scm-label">营收</div></div>' +
      '<div class="scm"><div class="scm-val">¥' + (s.profit/10000).toFixed(1) + '万</div><div class="scm-label">利润</div></div>' +
      '<div class="scm"><div class="scm-val">' + s.occupancy + '</div><div class="scm-label">入住率</div></div>' +
    '</div>' +
    '<div class="sc-bar"><div class="sc-fill" style="width:' + s.barPct + '%;background:' + s.barColor + '"></div></div>' +
  '</div>';
}).join('');

document.getElementById('dividendList').innerHTML = dividends.map(function(d) {
  return '<div class="dividend-item">' +
    '<div class="di-icon" style="background:#f3e5f5">' + d.icon + '</div>' +
    '<div class="di-body"><div class="di-name">' + d.store + ' · ' + d.period + '</div><div class="di-meta">分红发放 · ' + d.date + '</div></div>' +
    '<div class="di-amount">' + d.amount + '</div>' +
  '</div>';
}).join('');

function showToast(msg) {
  var t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.className = 'toast'; t.id = 'toast'; document.body.appendChild(t); }
  t.textContent = msg; t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 2000);
}

// ── 我的页面切换 ──
function toggleMyView() {
  var pageEl = document.querySelector('.page');
  var myView = document.getElementById('myView');
  if (myView.style.display === 'block') {
    myView.style.display = 'none';
    pageEl.style.display = 'block';
  } else {
    pageEl.style.display = 'none';
    myView.style.display = 'block';
  }
}

function logout() {
  localStorage.removeItem('erp_user');
  localStorage.removeItem('erp_token');
  localStorage.removeItem('erp_logged_in');
  window.location.href = '../home/index.html';
}
</script>
<style>
.toast { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:100;display:none; }
</style>
<div class="toast" id="toast"></div>
</body>
</html>
